name: Financier test diagnostics
on:
  pull_request:
    branches: [main]
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Capture tests
        run: npm test > financier-test-errors.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: financier-test-errors
          path: financier-test-errors.txt
