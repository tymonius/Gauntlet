name: Validate and merge Spies

on:
  push:
    branches:
      - feature/intelligence-spies-battle

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-merge:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/intelligence-spies-battle
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run typecheck
      - run: npm test

      - name: Remove one-time workflow
        run: |
          rm .github/workflows/validate-and-merge-spies.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/validate-and-merge-spies.yml
          git commit -m "Remove one-time Spies validation workflow"
          git push origin HEAD:feature/intelligence-spies-battle

      - name: Squash merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge 134 --repo tymonius/Gauntlet --squash --admin --subject "Implement Spies pre-reveal Battle effect (#134)" --body "Add true pre-normal-reveal Spies timing, private inspection, Battle Hand substitution, repeated Spies sequencing, guided controls, and tests."
