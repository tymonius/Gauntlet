name: Sync generic Deeds branch with main

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/add-generic-deed-cards'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-generic-deed-cards
          fetch-depth: 0
      - name: Merge current main and remove this workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --no-edit
          rm .github/workflows/sync-generic-deeds-with-main.yml
          git add -A
          git commit --amend --no-edit
          git push origin HEAD:agent/add-generic-deed-cards
