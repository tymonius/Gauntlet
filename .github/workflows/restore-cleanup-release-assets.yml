name: Restore unchanged release assets

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/restore-cleanup-release-assets.yml

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Restore published v0.6.0 card PDFs
        run: |
          git fetch origin main
          git checkout origin/main -- \
            releases/v0.6/Gauntlet_v0.6.0_Neutral_Cards.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Territories.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Military_Cards_and_Components.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Diplomat_Cards_and_Components.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Financier_Cards_and_Components.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Intelligence_Cards_and_Components.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Mystics_Cards_and_Components.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Inquisition_Cards_and_Components.pdf \
            releases/v0.6/Gauntlet_v0.6.0_All_Cards_and_Components.pdf
          node scripts/commit-generated-files.mjs \
            "Restore unchanged v0.6.0 release PDFs [skip ci]" -- \
            releases/v0.6/Gauntlet_v0.6.0_Neutral_Cards.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Territories.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Military_Cards_and_Components.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Diplomat_Cards_and_Components.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Financier_Cards_and_Components.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Intelligence_Cards_and_Components.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Mystics_Cards_and_Components.pdf \
            releases/v0.6/Gauntlet_v0.6.0_Inquisition_Cards_and_Components.pdf \
            releases/v0.6/Gauntlet_v0.6.0_All_Cards_and_Components.pdf
