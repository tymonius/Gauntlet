name: Financier diagnostics
on:
  pull_request:
    branches: [main]
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Capture typecheck
        run: npm run typecheck > typecheck-errors.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: financier-typecheck-errors
          path: typecheck-errors.txt
