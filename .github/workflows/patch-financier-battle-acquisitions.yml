name: Patch Financier Battle acquisitions
on:
  push:
    branches: [feature/financier-battle-acquisitions]
permissions:
  contents: write
jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[battle-acquisitions-patched]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/financier-battle-acquisitions
          fetch-depth: 0
      - name: Patch choice continuation and guided controls
        shell: python
        run: |
          from pathlib import Path

          apply_path = Path('src/state/apply.ts')
          text = apply_path.read_text()
          old = "if (action.type === 'resolve_financier_choice') { const next = structuredClone(game); const wasBattleChoice = isFinancierBattleChoice(next.pendingFinancierChoice); if (!resolveFinancierBattleChoice(next, action) && !resolveFinancierAcquisitionChoice(next, action) && !resolveFinancierCardChoice(next, action)) resolveFinancierChoice(next, action); reconcileFinancierCardState(next); enforceDiplomatAssetLimits(next); if (wasBattleChoice && !next.pendingFinancierChoice && !next.pendingMilitaryChoice && next.recentBattleResult) openPostBattleOrderWindow(next, next.recentBattleResult.winner); runPostActionAutomationPipeline(next); return { state: next }; }"
          new = "if (action.type === 'resolve_financier_choice') { const next = structuredClone(game); const wasBattleChoice = isFinancierBattleChoice(next.pendingFinancierChoice); if (!resolveFinancierBattleChoice(next, action) && !resolveFinancierAcquisitionChoice(next, action) && !resolveFinancierCardChoice(next, action)) resolveFinancierChoice(next, action); reconcileFinancierCardState(next); enforceDiplomatAssetLimits(next); if (wasBattleChoice && !next.pendingFinancierChoice) openNextFinancierChoice(next); if (wasBattleChoice && !next.pendingFinancierChoice && !next.pendingMilitaryChoice && next.recentBattleResult) openPostBattleOrderWindow(next, next.recentBattleResult.winner); runPostActionAutomationPipeline(next); return { state: next }; }"
          if old not in text:
              raise SystemExit('Financier choice continuation target not found')
          apply_path.write_text(text.replace(old, new, 1))

          guided_path = Path('src/dev/guided-options.ts')
          guided = guided_path.read_text()
          helper_anchor = "function militaryOption(label: string, action: StateAction, sourceCardId: string): GuidedOption { return { label, action, sourceCardId, cardText: exactCardText(sourceCardId) }; }"
          helper = """function affordableBattleCollateralSelections(cardIds: string[], capital: number, cost: number): string[][] {
  const selections: string[][] = [];
  const limit = Math.min(cardIds.length, 12);
  for (let mask = 0; mask < (1 << limit); mask += 1) {
    const selected = cardIds.slice(0, limit).filter((_, index) => (mask & (1 << index)) !== 0);
    if (capital + selected.reduce((sum, cardId) => sum + cardValue(cardId), 0) >= cost) selections.push(selected);
  }
  if (cardIds.length > limit) {
    const all = [...cardIds];
    if (capital + all.reduce((sum, cardId) => sum + cardValue(cardId), 0) >= cost) selections.push(all);
  }
  return selections;
}"""
          if helper not in guided:
              if helper_anchor not in guided:
                  raise SystemExit('Guided helper anchor not found')
              guided = guided.replace(helper_anchor, helper_anchor + '\n' + helper, 1)
          choice_anchor = "case 'battle_monetary_crisis': return pending.handOptions.map((cardId) => option(`Keep ${cardId}; discard the rest`, cardId, cardId));"
          choice = """case 'battle_leveraged_buyout': return [
      option('Decline the battle Leveraged Buyout', 'pass'),
      ...affordableBattleCollateralSelections(pending.collateralOptions, pending.capitalAvailable, pending.cost).map((cardIds) => option(cardIds.length === 0 ? `Buy ${pending.spaceId} with Capital` : `Buy ${pending.spaceId} using ${cardIds.join(', ')} as collateral`, 'purchase', undefined, undefined, pending.spaceId, cardIds)),
    ];"""
          if choice not in guided:
              if choice_anchor not in guided:
                  raise SystemExit('Guided Battle choice anchor not found')
              guided = guided.replace(choice_anchor, choice_anchor + '\n    ' + choice, 1)
          guided_path.write_text(guided)
      - name: Commit integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/state/apply.ts src/dev/guided-options.ts
          git commit -m "Integrate Financier Battle acquisitions [battle-acquisitions-patched]"
          git push origin HEAD:feature/financier-battle-acquisitions
