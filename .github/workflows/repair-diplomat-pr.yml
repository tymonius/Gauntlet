name: Repair Diplomat PR

on:
  push:
    branches:
      - agent/finalize-definitive-diplomat-guide

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Diplomat branch
        uses: actions/checkout@v4
        with:
          ref: agent/finalize-definitive-diplomat-guide
          fetch-depth: 0

      - name: Execute embedded rebase and remove repair files
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/test.yml')
          lines = path.read_text().splitlines()
          marker = '      - name: Rebuild Diplomat consolidation on current main'
          setup = '      - name: Setup Node'
          start = lines.index(marker)
          run_index = next(i for i in range(start, len(lines)) if lines[i].strip() == 'run: |') + 1
          end = lines.index(setup, run_index)
          body = []
          for line in lines[run_index:end]:
              body.append(line[10:] if line.startswith('          ') else line)
          Path('/tmp/rebase-diplomat.sh').write_text('\n'.join(body) + '\n')
          PY

          bash /tmp/rebase-diplomat.sh

          rm -f \
            .github/workflows/repair-diplomat-pr.yml \
            .github/workflows/rebase-diplomat-pr.yml \
            .github/diplomat-rebase-trigger

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
            git push --force origin HEAD:agent/finalize-definitive-diplomat-guide
          fi
