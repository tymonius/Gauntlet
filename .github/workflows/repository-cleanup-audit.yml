name: Audit repository cleanup

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build repository inventory
        run: |
          mkdir -p build/repository-cleanup-audit
          find . -path './.git' -prune -o -type f -printf '%P\t%s bytes\n' | sort > build/repository-cleanup-audit/all-files.tsv
          find docs releases -type f -printf '%P\t%s bytes\n' 2>/dev/null | sort > build/repository-cleanup-audit/docs-and-releases.tsv
          find docs -type f \( -name '*.md' -o -name '*.txt' \) -print 2>/dev/null | sort > build/repository-cleanup-audit/document-files.txt
          grep -RInE 'Gauntlet_v0\.6_(Working_Rules|Preliminary_Core_Rules|Card_Metadata|Open_Questions|Project_Index)|card-reviews/STATUS|COST_CURVE_AND_NEUTRAL_POOL_AUDIT|CONDITION_AUDIT|Gauntlet_v0\.6_Card_Review_Log' \
            --exclude-dir=.git . > build/repository-cleanup-audit/legacy-references.txt || true
          grep -RIlE '\bHeartlands?\b|Homeland Advantage|battle[- ]draw|\bAction card\b|\bBattle card\b|breakthrough victory' \
            --include='*.md' --include='*.ts' --include='*.js' --include='*.json' \
            --exclude-dir=.git --exclude-dir=node_modules . | sort > build/repository-cleanup-audit/stale-terminology-files.txt || true
          git ls-files > build/repository-cleanup-audit/tracked-files.txt
          git ls-files -s > build/repository-cleanup-audit/tracked-files-with-blobs.txt
          git rev-parse HEAD > build/repository-cleanup-audit/head.txt
          git rev-parse HEAD^{tree} > build/repository-cleanup-audit/tree.txt

      - uses: actions/upload-artifact@v4
        with:
          name: repository-cleanup-audit
          path: build/repository-cleanup-audit/
