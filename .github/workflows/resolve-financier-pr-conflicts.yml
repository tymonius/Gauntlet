name: Resolve Financier PR conflicts

on:
  push:
    branches:
      - agent/finalize-financier-faction-guide
    paths:
      - .github/workflows/resolve-financier-pr-conflicts.yml

permissions:
  contents: write

jobs:
  resolve:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finalize-financier-faction-guide
          fetch-depth: 0

      - name: Merge current main
        run: |
          git fetch origin main
          git merge --no-commit --no-ff origin/main || true
          for file in \
            docs/Gauntlet_v0.6_Card_Metadata.md \
            docs/Gauntlet_v0.6_Open_Questions.md \
            docs/Gauntlet_v0.6_Project_Index.md \
            docs/card-reviews/STATUS.md
          do
            git checkout --theirs -- "$file"
          done

      - name: Reconcile Financier and Intelligence rollups
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f"Missing expected text in {label}: {old}")
              return text.replace(old, new, 1)

          def replace_section(text, start, end, replacement, label):
              try:
                  a = text.index(start)
                  b = text.index(end, a)
              except ValueError as exc:
                  raise SystemExit(f"Missing section boundary in {label}: {exc}")
              return text[:a] + replacement.rstrip() + "\n\n" + text[b:]

          # Card metadata: retain Intelligence additions from main and restore definitive Financier metadata.
          path = Path("docs/Gauntlet_v0.6_Card_Metadata.md")
          text = path.read_text(encoding="utf-8")
          text = replace_once(
              text,
              "`Gauntlet_v0.6_Financier_Card_Pool.md`, and `Gauntlet_v0.6_Intelligence_Card_Pool.md`",
              "`../releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.md`, and `Gauntlet_v0.6_Intelligence_Card_Pool.md`",
              path,
          )
          text = replace_once(
              text,
              "The definitive Military, Diplomat, and Inquisition guides also govern",
              "The definitive Military, Diplomat, Inquisition, and Financier guides also govern",
              path,
          )
          financier_metadata = '''## Active Financier package metadata

This table records Financier metadata; the definitive Financier faction guide governs all player-facing rules and exact card text.

| ID | Card | Cost | Starter eligible | Complexity | Unique | Watchlist |
|---|---|---:|---|---|---|---|
| F1 | Speculation | 1 | TBD | Advanced | No | Visible self-tracking, Capital wager, and failure destination |
| F2 | Monetary Crisis | 2 | TBD | Basic | No | Repeated hand resets and Treasury asymmetry |
| F3 | Liquidation | 2 | TBD | Advanced | No | Temporary over-limit Capital and immediate-purchase timing |
| F4 | Underwriting | 2 | TBD | Advanced | No | Narrow standalone floor and Subsidize incentives |
| F5 | Capital Gains | 3 | TBD | Advanced | No | High-value preservation and delayed-investment tracking |
| F6 | Tariffs | 3 | No | Advanced | No | Action compression, delayed draw loss, and debt evasion |
| F7 | Divestment | 3 | TBD | Advanced | No | Sell-and-rebuy lines and portfolio-loop efficiency |
| F8 | Margin Loan | 3 | No | Advanced | No | Default timing, collateral recovery, and Action compression |
| F9 | Leveraged Buyout | 4 | No | Advanced | No | Additional Battle-card collateral and full-cost financing |
| F10 | Foreclosure | 4 | No | Advanced | No | Adjacency counterplay and ownership-to-control conversion |
| F11 | Property Dues | 4 | No | Advanced | No | Multiple-copy stacking and repeated movement pressure |
| F12 | Corner the Market | 5 | No | Advanced | Yes | Sudden Controlling Interest conversion after visible preparation |'''
          text = replace_section(text, "## Active Financier package metadata", "## Active Intelligence package metadata", financier_metadata, path)
          text = replace_once(
              text,
              "- The Financier pool contains exactly 12 unique cards with the approved 1 / 3 / 4 / 3 / 1 cost curve, total value 36, and average value 3.0; its active source is `Gauntlet_v0.6_Financier_Card_Pool.md`.",
              "- The Financier pool contains exactly 12 unique cards with the approved 1 / 3 / 4 / 3 / 1 cost curve, total value 36, and average value 3.00; its definitive source is the release faction guide.",
              path,
          )
          text = replace_once(
              text,
              "- Remaining card work concerns the Mystics package, copied-effect rules, Financier and Intelligence package playtesting and production, and canonical-data production.",
              "- Remaining work concerns the Mystics package, copied-effect rules, Financier and Intelligence playtesting and production, and canonical-data production.",
              path,
          )
          path.write_text(text, encoding="utf-8")

          # Review status: Intelligence remains the newest pool; Financiers now have a definitive guide.
          path = Path("docs/card-reviews/STATUS.md")
          text = path.read_text(encoding="utf-8")
          text = replace_once(text, "**Last completed faction pool:** Intelligence  ", "**Last completed faction pool:** Intelligence  \n**Last completed definitive faction guide:** Financiers  ", path)
          text = replace_once(text, "**Financier pool:** Complete at 12 cards; working exact-text pool approved", "**Financier pool:** Complete at 12 cards; definitive faction guide packaged", path)
          text = replace_once(text, "5. `../Gauntlet_v0.6_Financier_Card_Pool.md` — approved Financier roster, exact text, package structure, rules clarifications, and playtest watchlist", "5. `../../releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.md` — definitive Financier rules and exact card pool", path)
          text = replace_once(text, "and Inquisition's former split pool, design-note, supplemental, and working-guide files have been consolidated into definitive guides and removed.", "Inquisition's former split pool, design-note, supplemental, and working-guide files, and the Financier split pool and design notes have been consolidated into definitive guides and removed.", path)
          text = replace_once(text, "- current Financier and Intelligence faction frameworks.", "- definitive Financier extra-action, capped Deed and buyout cost, Manifest Destiny Deed, Capital, Treasury, and leader rules;\n- the current Intelligence faction framework.", path)
          financier_status = '''### Financiers

- Curve: **1 / 3 / 4 / 3 / 1**; total 36; average 3.00.
- Roster: **Speculation; Monetary Crisis; Liquidation; Underwriting; Capital Gains; Tariffs; Divestment; Margin Loan; Leveraged Buyout; Foreclosure; Property Dues; Corner the Market**.
- **Corner the Market** is the Unique cost-5 statement card.
- Deed base costs and Financier-mirror buyout premiums stop scaling after 6.
- Manifest Destiny Territories have normal Deeds and expand Controlling Interest.
- The definitive source is `releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.md`, with matching release DOCX and PDF.'''
          text = replace_section(text, "### Financiers", "### Intelligence", financier_status, path)
          text = text.replace("- Synchronize approved Financier rules clarifications into the Working Rules.\n", "")
          text = replace_once(text, "- Playtest the Financier and Intelligence card pools and complete their definitive faction guides, supplemental components, printable sheets, and physical reviews.", "- Playtest the Financier definitive guide and Intelligence card pool; complete the Intelligence definitive guide and both factions' remaining supplemental, printable, and physical-review work.", path)
          text = replace_once(text, "Begin focused playtesting of the approved Financier and Intelligence pools while continuing design work on Mystics. Convert each working exact-text pool into a definitive faction guide and printable package only after its package rules, leaders, primary watchlist, and physical text survive testing.", "Playtest the definitive Financier guide and the approved Intelligence pool while continuing design work on Mystics. Complete the Intelligence definitive guide and the remaining Financier and Intelligence printable packages after their rules, leaders, watchlists, and physical text survive focused testing.", path)
          path.write_text(text, encoding="utf-8")

          # Open questions: retain Intelligence completion and replace Financier working-source section.
          path = Path("docs/Gauntlet_v0.6_Open_Questions.md")
          text = path.read_text(encoding="utf-8")
          text = replace_once(text, "- definitive Military, Diplomat, and Inquisition faction guides in Markdown, DOCX, and PDF formats.", "- definitive Military, Diplomat, Inquisition, and Financier faction guides in Markdown, DOCX, and PDF formats.", path)
          text = text.replace("- Synchronize approved Financier rules clarifications into the Working Rules.\n", "")
          text = replace_once(text, "- Playtest the Financier and Intelligence card pools and complete their definitive faction guides, supplemental components, printable sheets, and physical reviews.", "- Playtest the Financier definitive guide and Intelligence card pool; complete the Intelligence definitive guide and both factions' remaining supplemental, printable, and physical-review work.", path)
          financier_questions = '''## Financiers

Definitive source: `../releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.md`. The adjacent PDF and DOCX are the release-formatted editions. The earlier split Financier pool and design-note documents have been consolidated and removed.

Closed production decisions:

- The package contains twelve cards with a **1 / 3 / 4 / 3 / 1** curve, total value 36, and average value 3.00.
- **Corner the Market** is the Unique cost-5 statement card.
- Added Territories receive normal Deeds; Deed base costs and buyout premiums stop scaling after 6.
- **Take an extra action** grants a full additional Action opportunity.
- The package uses two Leader Cards, one Financier Reference, and a public Capital / Deed ledger or equivalent record rather than currency tokens.

Open questions:

- Is Capital accumulation fast enough without becoming runaway?
- Is the Capital-limit formula easy to track physically?
- Does Treasury create planning rather than disconnected setup?
- Are Deed costs and buyout premiums intuitive, including mirrors and Manifest Destiny?
- Is Play the Market appropriately swingy?
- Is Subsidize understandable and balanced?
- Should Line of Credit collateral remain in discard rather than the Graveyard?
- Does Hostile Takeover snowball too quickly?
- Are Banker and Executive comparably strong?
- Do Tariffs, Divestment, and Margin Loan collectively erase intended Action pressure?
- Do repeated Monetary Crisis and stacked Property Dues create excessive denial?
- Are Divestment loops, Leveraged Buyout collateral, Foreclosure, and Capital Gains fair?
- Is Underwriting's standalone floor sufficient?
- Is the self-tracking burden of Speculation, Capital Gains, and Margin Loan acceptable?
- Does Corner the Market create a visible, dramatic finish?'''
          text = replace_section(text, "## Financiers", "## Intelligence", financier_questions, path)
          path.write_text(text, encoding="utf-8")

          # Project index: current main supplies Intelligence; restore Financier definitive hierarchy and checkpoint.
          path = Path("docs/Gauntlet_v0.6_Project_Index.md")
          text = path.read_text(encoding="utf-8")
          text = replace_once(text, "7. **`Gauntlet_v0.6_Financier_Card_Pool.md`** — active Financier exact-text source: approved twelve-card roster, costs, wording, package-specific rules clarifications, strategic notes, and initial playtest watchlist. It remains authoritative until a definitive Financier faction guide supersedes it.", "7. **`../releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.md`** — definitive Financier faction source: rules, Banker, Executive, Capital, Treasury, Deeds, Play the Market, Subsidize, Controlling Interest, components, strategy, terminology, and the canonical twelve-card pool. The adjacent PDF and DOCX are the release-formatted editions.", path)
          text = replace_once(text, "Active v0.6 documents govern until the remaining Mystics card package, copied-effect rules, Financier and Intelligence production packages, and package testing are resolved. For Military, Diplomats, and Inquisition, the definitive faction guides above override earlier development records and split package documents, which have been removed from the active repository. The Financier and Intelligence exact-text pools override their migration-era records until they are consolidated into definitive guides.", "Active v0.6 documents govern until the remaining Mystics card package, copied-effect rules, Intelligence production package, and package testing are resolved. For Military, Diplomats, Inquisition, and Financiers, the definitive faction guides above override earlier development records and split package documents, which have been removed from the active repository. The Intelligence exact-text pool overrides its migration-era records until it is consolidated into a definitive guide.", path)
          text = text.replace("23. **`Gauntlet_v0.6_Financier_Design_Notes.md`** — Financier identity, strategic rationale, audit findings, and test priorities.\n", "")
          text = replace_once(text, "The split Diplomat pool, design-note, and supplemental-component documents and the split Inquisition pool, design-note, supplemental-component, and working-guide documents were likewise removed after consolidation into their definitive guides.", "The split Diplomat pool, design-note, and supplemental-component documents, the split Inquisition pool, design-note, supplemental-component, and working-guide documents, and the split Financier pool and design notes were likewise removed after consolidation into their definitive guides.", path)
          financier_checkpoint = '''### Financier checkpoint

- Curve: **1 / 3 / 4 / 3 / 1**.
- Total value: 36; average: 3.00.
- Roster: **Speculation; Monetary Crisis; Liquidation; Underwriting; Capital Gains; Tariffs; Divestment; Margin Loan; Leveraged Buyout; Foreclosure; Property Dues; Corner the Market**.
- **Corner the Market** is the Unique cost-5 statement card.
- Deed base costs and opposing-owner buyout premiums stop scaling after 6.
- Manifest Destiny Territories receive normal Deeds and expand Controlling Interest.
- The supplemental specification uses either leader, one Financier Reference, and a public Capital / Deed ledger or equivalent record.
- `../releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.md` is the definitive Financier source; the adjacent DOCX and PDF are release-formatted editions using the Banker and Executive sketches under `../images/sketches/`.'''
          text = replace_section(text, "### Financier checkpoint", "### Intelligence checkpoint", financier_checkpoint, path)
          text = text.replace("- Synchronize approved Financier rules clarifications into the Working Rules.\n", "")
          text = replace_once(text, "- Playtest the Financier and Intelligence pools and complete their definitive guides, supplemental components, printable sheets, and physical reviews.", "- Playtest the Financier definitive guide and Intelligence pool; complete the Intelligence definitive guide and both factions' remaining supplemental, printable, and physical-review work.", path)
          text = replace_once(text, "current Inquisition rules, and current Financier and Intelligence frameworks.", "current Inquisition and Financier rules, and the current Intelligence framework.", path)
          text = replace_once(text, "integration summaries for the three completed definitive faction guides.", "integration summaries for the four completed definitive faction guides.", path)
          text = replace_once(text, "reads the active Neutral, Military, Diplomat, Inquisition, and Territory Markdown sources", "reads the active Neutral, Military, Diplomat, Inquisition, Financier, and Territory Markdown sources", path)
          text = replace_once(text, "Mystics remains disabled pending a completed card package. Financiers and Intelligence remain disabled pending definitive-guide, supplemental-component, and printable-package integration.", "Mystics and Intelligence remain disabled pending completed definitive-guide and printable-package integration.", path)
          text = replace_once(text, "The definitive Military, Diplomat, and Inquisition guide packages are under `releases/v0.6/faction-guides/` in Markdown, DOCX, and PDF formats.", "The definitive Military, Diplomat, Inquisition, and Financier guide packages are under `releases/v0.6/faction-guides/` in Markdown, DOCX, and PDF formats.", path)
          text = replace_once(text, "Financier and Intelligence card design is complete, but their definitive guides, reference components, tracker treatment, and printable faction sheets remain to be produced.", "The Financier definitive guide is complete; its dedicated printable faction sheet remains production work. Intelligence card design is complete, but its definitive guide, supplemental components, and printable sheet remain to be produced.", path)
          text = replace_once(text, "Playtest the approved Financier and Intelligence exact-text pools, especially their primary watchlists, while completing the Mystics card package. Record shared-rules corrections in the Working Rules first. After Financiers and Intelligence survive focused testing, consolidate their rules, leaders, references, trackers, strategy, and twelve cards into definitive faction guides and printable packages. Continue physical review of the preliminary core rulebook and completed definitive faction guides in parallel.", "Playtest the definitive Financier guide and approved Intelligence exact-text pool while completing the Mystics card package. Record shared-rules corrections in the Working Rules first. After Intelligence survives focused testing, consolidate its rules, leaders, references, strategy, and twelve cards into a definitive guide and printable package; complete the Financier printable sheet in parallel. Continue physical review of the preliminary core rulebook and completed definitive faction guides.", path)

          # Renumber source-hierarchy entries after removing the Financier design-notes item.
          counter = 0
          lines = []
          for line in text.splitlines():
              if re.match(r"^\d+\. \*\*", line):
                  counter += 1
                  line = re.sub(r"^\d+\.", f"{counter}.", line)
              lines.append(line)
          text = "\n".join(lines) + "\n"
          path.write_text(text, encoding="utf-8")
          PY

      - name: Validate merge resolution
        run: |
          unresolved="$(git diff --name-only --diff-filter=U)"
          if [ -n "$unresolved" ]; then
            echo "Unresolved files:"
            echo "$unresolved"
            exit 1
          fi
          grep -q '112 current playable-card designs' docs/Gauntlet_v0.6_Card_Metadata.md
          grep -q 'definitive Financier faction guide' docs/Gauntlet_v0.6_Card_Metadata.md
          grep -q 'Active Intelligence package metadata' docs/Gauntlet_v0.6_Card_Metadata.md
          grep -q 'Last completed definitive faction guide.*Financiers' docs/card-reviews/STATUS.md
          grep -q 'Gauntlet_v0.6_Intelligence_Card_Pool.md' docs/Gauntlet_v0.6_Project_Index.md
          grep -q 'Gauntlet_v0.6_Financier_Faction_Guide.md' docs/Gauntlet_v0.6_Project_Index.md
          test -f docs/Gauntlet_v0.6_Intelligence_Card_Pool.md

      - name: Commit resolved merge
        run: |
          rm .github/workflows/resolve-financier-pr-conflicts.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Merge main and resolve Financier documentation conflicts'
          git push origin HEAD:agent/finalize-financier-faction-guide
