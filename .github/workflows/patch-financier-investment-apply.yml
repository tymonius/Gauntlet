name: Patch Financier investment integration

on:
  push:
    branches:
      - feature/financier-investment-actions

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[investment-apply-patched]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/financier-investment-actions
          fetch-depth: 0
      - name: Patch apply integration
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/state/apply.ts')
          text = path.read_text()

          text = text.replace(
              "import { applyFinancierActionEffect, resolveFinancierCardChoice, resolveFinancierCardTurnStart } from './financier-cards';",
              "import { applyFinancierActionEffect, reconcileFinancierCardState, requireTariffsMayLeavePlay, resolveFinancierCardChoice, resolveFinancierCardTurnStart, shouldSkipNormalDrawForTariffs } from './financier-cards';",
          )

          text = text.replace(
              "function applyFinancierStateAction(game: GameState, action: Extract<StateAction, { type: 'place_treasury_card' | 'begin_deed_purchase' | 'begin_play_the_market' | 'use_hostile_takeover' }>): void {",
              "function skipTariffsDraw(game: GameState, playerId: PlayerID): ApplyGameActionResult {\n  if (game.activePlayer !== playerId || game.phase !== 'turn_start') throw new GameActionError('Tariffs can replace only your normal turn-start draw.');\n  const next = structuredClone(game);\n  next.phase = 'action_before_movement';\n  next.log.push({ id: `${next.id}-event-${next.log.length + 1}`, turn: next.turn, actor: playerId, type: 'financier_tariffs_draw_skipped', message: `${next.players[playerId].name} skipped their normal draw because Tariffs is banked.`, visibility: 'public' });\n  runPostActionAutomationPipeline(next);\n  return { state: next };\n}\n\nfunction applyFinancierStateAction(game: GameState, action: Extract<StateAction, { type: 'place_treasury_card' | 'begin_deed_purchase' | 'begin_play_the_market' | 'use_hostile_takeover' }>): void {",
          )

          text = text.replace(
              "if (action.type === 'resolve_financier_choice') { const next = structuredClone(game); if (!resolveFinancierCardChoice(next, action)) resolveFinancierChoice(next, action); enforceDiplomatAssetLimits(next); runPostActionAutomationPipeline(next); return { state: next }; }",
              "if (action.type === 'resolve_financier_choice') { const next = structuredClone(game); if (!resolveFinancierCardChoice(next, action)) resolveFinancierChoice(next, action); reconcileFinancierCardState(next); enforceDiplomatAssetLimits(next); runPostActionAutomationPipeline(next); return { state: next }; }",
          )

          text = text.replace(
              "if (game.pendingLeaderAbilityWindow) throw new GameActionError('Resolve or pass the pending post-battle Order window first.');\n\n  validateV06EndpointMovement(game, action);",
              "if (game.pendingLeaderAbilityWindow) throw new GameActionError('Resolve or pass the pending post-battle Order window first.');\n  if (action.type === 'draw_card' && game.phase === 'turn_start' && shouldSkipNormalDrawForTariffs(game, action.playerId)) return skipTariffsDraw(game, action.playerId);\n  if (action.type === 'resolve_asset_bank_discard') requireTariffsMayLeavePlay(game, action.playerId, action.cardIds);\n\n  validateV06EndpointMovement(game, action);",
          )

          text = text.replace(
              "removeCapturedEncampments(result.state); removeBlockadesAfterControlChange(result.state); enforceDiplomatAssetLimits(result.state);",
              "reconcileFinancierCardState(result.state); removeCapturedEncampments(result.state); removeBlockadesAfterControlChange(result.state); enforceDiplomatAssetLimits(result.state);",
          )

          text = text.replace(
              "if (!result.state.pendingDiplomatChoice) openDemilitarizedZoneUpkeep(result.state, result.state.activePlayer);",
              "if (!result.state.pendingDiplomatChoice && !result.state.pendingFinancierChoice) openDemilitarizedZoneUpkeep(result.state, result.state.activePlayer);",
          )

          required = [
              'reconcileFinancierCardState',
              'shouldSkipNormalDrawForTariffs',
              'requireTariffsMayLeavePlay',
              'financier_tariffs_draw_skipped',
          ]
          missing = [token for token in required if token not in text]
          if missing:
              raise SystemExit(f'Missing patched tokens: {missing}')

          path.write_text(text)
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/state/apply.ts
          git commit -m "Integrate Financier investment lifecycle [investment-apply-patched]"
          git push origin HEAD:feature/financier-investment-actions
