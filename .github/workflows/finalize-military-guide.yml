name: Finalize Military faction guide

on:
  push:
    branches:
      - agent/finalize-military-faction-guide
    paths:
      - .github/workflows/finalize-military-guide.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finalize-military-faction-guide
          fetch-depth: 0

      - name: Install document tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer poppler-utils zip unzip

      - name: Reconstruct final DOCX
        shell: bash
        run: |
          set -euo pipefail
          outdir="releases/v0.6/faction-guides/military"
          destination="$outdir/Gauntlet_v0.6_Military_Faction_Guide.docx"
          mkdir -p "$outdir"

          count="$(find tmp/military-guide -maxdepth 1 -name 'template.part*' | wc -l)"
          test "$count" = "9"

          cat tmp/military-guide/template.part* | tr -d '\r\n' | base64 --decode > "$destination"
          unzip -t "$destination"

          media_dir="$(mktemp -d)"
          mkdir -p "$media_dir/word/media"
          cp images/sketches/general.png "$media_dir/word/media/image1.png"
          cp images/sketches/commandant.png "$media_dir/word/media/image2.png"
          absolute_destination="$GITHUB_WORKSPACE/$destination"
          (cd "$media_dir" && zip -q -u "$absolute_destination" word/media/image1.png word/media/image2.png)
          unzip -t "$destination"

      - name: Export and validate final PDF
        run: |
          libreoffice --headless --convert-to pdf \
            --outdir releases/v0.6/faction-guides/military \
            releases/v0.6/faction-guides/military/Gauntlet_v0.6_Military_Faction_Guide.docx

          test -s releases/v0.6/faction-guides/military/Gauntlet_v0.6_Military_Faction_Guide.docx
          test -s releases/v0.6/faction-guides/military/Gauntlet_v0.6_Military_Faction_Guide.pdf
          test "$(pdfinfo releases/v0.6/faction-guides/military/Gauntlet_v0.6_Military_Faction_Guide.pdf | awk '/Pages:/ {print $2}')" = "11"

      - name: Commit release artifacts and remove staging files
        run: |
          rm -rf tmp/military-guide
          rm .github/workflows/finalize-military-guide.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add final Military faction guide PDF and DOCX"
          git push
