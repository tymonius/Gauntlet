name: Diagnose Military faction guide build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finalize-military-faction-guide
          fetch-depth: 0

      - name: Diagnose reconstruction
        shell: bash
        run: |
          set +e
          log="military-guide-build-diagnostic.txt"
          {
            echo "PWD=$PWD"
            echo "HEAD=$(git rev-parse HEAD)"
            echo "--- staging files ---"
            find tmp/military-guide -maxdepth 1 -type f -printf '%f %s bytes\n' | sort
            echo "--- checksums ---"
            sha1sum tmp/military-guide/template.part* || true
            echo "--- source images ---"
            file images/sketches/general.png images/sketches/commandant.png || true
            echo "--- Python reconstruction ---"
            python3 <<'PY'
          from pathlib import Path
          import base64
          import io
          import traceback
          import zipfile

          try:
              root = Path.cwd()
              chunks = sorted((root / "tmp/military-guide").glob("template.part*"))
              print("chunk_count", len(chunks))
              for path in chunks:
                  print(path.name, path.stat().st_size)
              encoded = "".join(path.read_text(encoding="utf-8").strip() for path in chunks)
              print("encoded_chars", len(encoded), "mod4", len(encoded) % 4)
              raw = base64.b64decode(encoded, validate=True)
              print("decoded_bytes", len(raw), "magic", raw[:4])
              with zipfile.ZipFile(io.BytesIO(raw), "r") as zf:
                  print("zip_entries", len(zf.namelist()))
                  print("zip_test", zf.testzip())
                  print("media", [n for n in zf.namelist() if n.startswith("word/media/")])
          except Exception:
              traceback.print_exc()
          PY
          } > "$log" 2>&1

          rm .github/workflows/finalize-military-guide.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$log" .github/workflows/finalize-military-guide.yml
          git commit -m "Record Military guide build diagnostic"
          git push
