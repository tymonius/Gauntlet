name: Finalize Military faction guide

on:
  push:
    branches:
      - agent/finalize-military-faction-guide
    paths:
      - .github/workflows/finalize-military-guide.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finalize-military-faction-guide
          fetch-depth: 0

      - name: Install document tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer poppler-utils

      - name: Reconstruct final DOCX
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64
          import io
          import zipfile

          root = Path.cwd()
          staging = root / "tmp/military-guide"
          outdir = root / "releases/v0.6/faction-guides/military"
          outdir.mkdir(parents=True, exist_ok=True)

          chunks = sorted(staging.glob("template.part*"))
          if len(chunks) != 9:
              raise SystemExit(f"Expected 9 template chunks, found {len(chunks)}")

          template = base64.b64decode("".join(path.read_text().strip() for path in chunks))
          general = root / "images/sketches/general.png"
          commandant = root / "images/sketches/commandant.png"
          destination = outdir / "Gauntlet_v0.6_Military_Faction_Guide.docx"

          with zipfile.ZipFile(io.BytesIO(template), "r") as source, zipfile.ZipFile(
              destination, "w", zipfile.ZIP_DEFLATED, compresslevel=9
          ) as target:
              for item in source.infolist():
                  target.writestr(item, source.read(item.filename))
              target.writestr("word/media/image1.png", general.read_bytes())
              target.writestr("word/media/image2.png", commandant.read_bytes())
          PY

      - name: Export and validate final PDF
        run: |
          libreoffice --headless --convert-to pdf \
            --outdir releases/v0.6/faction-guides/military \
            releases/v0.6/faction-guides/military/Gauntlet_v0.6_Military_Faction_Guide.docx

          test -s releases/v0.6/faction-guides/military/Gauntlet_v0.6_Military_Faction_Guide.docx
          test -s releases/v0.6/faction-guides/military/Gauntlet_v0.6_Military_Faction_Guide.pdf
          test "$(pdfinfo releases/v0.6/faction-guides/military/Gauntlet_v0.6_Military_Faction_Guide.pdf | awk '/Pages:/ {print $2}')" = "11"

      - name: Commit release artifacts and remove staging files
        run: |
          rm -rf tmp/military-guide
          rm .github/workflows/finalize-military-guide.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add final Military faction guide PDF and DOCX"
          git push
