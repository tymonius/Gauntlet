name: Financier investment diagnostics
on:
  pull_request:
    branches: [main]
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Capture typecheck and tests
        run: |
          npm run typecheck > financier-investment-errors.txt 2>&1 || true
          npm test >> financier-investment-errors.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: financier-investment-errors
          path: financier-investment-errors.txt
