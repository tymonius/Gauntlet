name: Apply Intelligence audit fixes

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: feature/intelligence-integration-audit
          fetch-depth: 0

      - name: Apply audited canonical fixes
        run: python .github/apply_intelligence_audit.py

      - name: Commit fixes and restore standard CI
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix Intelligence integration audit findings"
          git push origin HEAD:feature/intelligence-integration-audit
