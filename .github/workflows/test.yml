name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck-output.log

      - name: Upload typecheck output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-output
          path: typecheck-output.log

      - name: Test
        run: npm test
