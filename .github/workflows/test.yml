name: Apply Intelligence audit fixes

on:
  push:
    branches:
      - feature/intelligence-integration-audit

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: feature/intelligence-integration-audit
          fetch-depth: 0

      - name: Apply audited canonical fixes
        shell: python
        run: |
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f'Missing expected text in {path}: {old[:100]!r}')
              p.write_text(text.replace(old, new))

          # Intelligence Action legality.
          replace(
              'src/state/intelligence-action-cards.ts',
              """  if (cardId === INTELLIGENCE_ACTION_CARDS.fogOfWar) return canPlaceFogOfWarOverlay(game);
            if (cardId === INTELLIGENCE_ACTION_CARDS.operationalReassessment) return Boolean(player.intelligence.activeMission);
            if (cardId === INTELLIGENCE_ACTION_CARDS.sleeperNetwork) return canResolveSleeperNetworkAction(game, playerId);
            return true;
          """.replace('          ', ''),
              """  if (cardId === INTELLIGENCE_ACTION_CARDS.fogOfWar) return canPlaceFogOfWarOverlay(game);
            if (cardId === INTELLIGENCE_ACTION_CARDS.operationalReassessment) {
              return Boolean(player.intelligence.activeMission)
                && player.zones.hand.some((candidate) => intelligenceMissionCardIds.has(candidate));
            }
            if (cardId === INTELLIGENCE_ACTION_CARDS.assassins) {
              return Boolean(game.players[opponentId(game, playerId)]?.zones.hand.length);
            }
            if (cardId === INTELLIGENCE_ACTION_CARDS.sleeperNetwork) return canResolveSleeperNetworkAction(game, playerId);
            return true;
          """.replace('          ', ''),
          )
          replace(
              'src/state/intelligence-action-cards.ts',
              """  const mission = player.intelligence!.activeMission;
            if (!mission) throw new IntelligenceActionCardError('Operational Reassessment requires an Active Mission.');

            player.intelligence!.activeMission = undefined;
            player.zones.hand.push(mission.cardId);
          """.replace('          ', ''),
              """  const mission = player.intelligence!.activeMission;
            if (!mission) throw new IntelligenceActionCardError('Operational Reassessment requires an Active Mission.');
            const replacementMissionCards = player.zones.hand.filter((cardId) => intelligenceMissionCardIds.has(cardId));
            if (replacementMissionCards.length === 0) {
              throw new IntelligenceActionCardError('Operational Reassessment requires another eligible Mission card in hand.');
            }

            player.intelligence!.activeMission = undefined;
            player.zones.hand.push(mission.cardId);
          """.replace('          ', ''),
          )
          replace(
              'src/state/intelligence-action-cards.ts',
              "const eligibleCardIds = [...new Set(player.zones.hand.filter((cardId) => cardId !== mission.cardId && intelligenceMissionCardIds.has(cardId)))];",
              "const eligibleCardIds = [...new Set(replacementMissionCards)];",
          )

          # Sleeper Network activation must play every legally resolvable Action.
          replace(
              'src/types/intelligence.ts',
              "options: ['finish', 'select'];",
              "options: ['select'];",
          )
          replace(
              'src/state/intelligence-sleeper-network.ts',
              "options: ['finish', 'select'],",
              "options: ['select'],",
          )
          replace(
              'src/state/intelligence-sleeper-network.ts',
              """  if (pending.kind === 'sleeper_network_play_card') {
                if (action.choice === 'finish') {
                  finishNetwork(game, action.playerId, 'activation_finished');
                  return { kind: 'none' };
                }
                if (action.choice !== 'select' || !action.cardId || !pending.eligibleCardIds.includes(action.cardId)) throw new SleeperNetworkError('Choose a legally resolvable Action card beneath Sleeper Network or finish.');
          """.replace('          ', ''),
              """  if (pending.kind === 'sleeper_network_play_card') {
                if (action.choice !== 'select' || !action.cardId || !pending.eligibleCardIds.includes(action.cardId)) throw new SleeperNetworkError('Choose a legally resolvable Action card beneath Sleeper Network.');
          """.replace('          ', ''),
          )
          replace(
              'src/dev/intelligence-battle-options.ts',
              """  if (pending.kind === 'sleeper_network_play_card') {
                return [
                  action('Finish Sleeper Network activation', 'finish'),
                  ...pending.eligibleCardIds.map((cardId) => action(`Play ${cardId} from Sleeper Network`, 'select', cardId)),
                ];
              }
          """.replace('          ', ''),
              """  if (pending.kind === 'sleeper_network_play_card') {
                return pending.eligibleCardIds.map((cardId) => action(`Play ${cardId} from Sleeper Network`, 'select', cardId));
              }
          """.replace('          ', ''),
          )
          replace(
              'src/state/intelligence-sleeper-network.test.ts',
              """  it('allows the player to stop an activation early and discard all remaining cards', () => {
                let state = bankNetwork(game());
                state.players.player_1.intelligence!.sleeperNetwork!.cards.push('intelligence-spies');
                state.turn = 3;
                state.phase = 'turn_start';
                runPostActionAutomationPipeline(state);
                state = applyGameAction(state, { type: 'resolve_intelligence_choice', playerId: 'player_1', choice: 'activate' }).state;

                state = applyGameAction(state, {
                  type: 'resolve_intelligence_choice',
                  playerId: 'player_1',
                  choice: 'finish',
                }).state;

                expect(state.players.player_1.zones.discard).toEqual(expect.arrayContaining([
                  'card-attrition',
                  'intelligence-spies',
                ]));
                expect(state.players.player_1.intelligence?.sleeperNetwork).toBeUndefined();
              });
          """.replace('          ', ''),
              """  it('requires every legally resolvable Action to be played before activation ends', () => {
                let state = bankNetwork(game());
                state.players.player_1.intelligence!.sleeperNetwork!.cards.push('intelligence-spies');
                state.turn = 3;
                state.phase = 'turn_start';
                runPostActionAutomationPipeline(state);
                state = applyGameAction(state, { type: 'resolve_intelligence_choice', playerId: 'player_1', choice: 'activate' }).state;

                expect(state.pendingIntelligenceChoice).toMatchObject({
                  kind: 'sleeper_network_play_card',
                  options: ['select'],
                  eligibleCardIds: expect.arrayContaining(['card-attrition', 'intelligence-spies']),
                });
                expect(() => applyGameAction(state, {
                  type: 'resolve_intelligence_choice',
                  playerId: 'player_1',
                  choice: 'finish',
                })).toThrow(/legally resolvable Action card/i);
                expect(state.players.player_1.intelligence?.sleeperNetwork).toBeDefined();
              });
          """.replace('          ', ''),
          )

          # Fog Overlay stays on the Territory until a battle is actually fought and ends.
          replace(
              'src/state/intelligence-fog-overlay.ts',
              "BattleParticipantState,\n  GameEvent,",
              "BattleParticipantState,\n  BattleState,\n  GameEvent,",
          )
          replace(
              'src/state/intelligence-fog-overlay.ts',
              """  space.overlays = (space.overlays ?? []).filter((overlay) => overlay.cardId !== FOG_OF_WAR_OVERLAY);
            for (const overlay of overlays) game.players[overlay.owner].zones.discard.push(overlay.cardId);

            const owners = [...new Set(overlays.map((overlay) => overlay.owner))];
          """.replace('          ', ''),
              """  const owners = [...new Set(overlays.map((overlay) => overlay.owner))];
          """.replace('          ', ''),
          )
          marker = "export function requireFogOfWarOverlayOrder(game: GameState, action: AppStateAction): void {"
          insertion = """function fogBattleWasFought(battle: BattleState): boolean {
            if (battle.stage !== 'hand_commit') return true;
            return Boolean(
              battle.attacker.handCommit
              || battle.attacker.passedHandCommit
              || battle.defender.handCommit
              || battle.defender.passedHandCommit,
            );
          }

          export function consumeFogOfWarOverlayAfterBattle(game: GameState, battle: BattleState): boolean {
            const owner = battle.fogOfWarOverlayOwner;
            if (!owner || !fogBattleWasFought(battle)) return false;
            const space = game.board.spaces.find((candidate) => candidate.id === battle.location);
            const index = space?.overlays?.findIndex((overlay) => (
              overlay.cardId === FOG_OF_WAR_OVERLAY && overlay.owner === owner
            )) ?? -1;
            if (!space?.overlays || index < 0) return false;
            space.overlays.splice(index, 1);
            game.players[owner].zones.discard.push(FOG_OF_WAR_OVERLAY);
            publicLog(
              game,
              owner,
              'intelligence_fog_of_war_overlay_removed',
              'Fog of War was removed after the battle fought on its Territory.',
              { spaceId: space.id, battleId: battle.id },
            );
            return true;
          }

          """.replace('          ', '')
          p = Path('src/state/intelligence-fog-overlay.ts')
          text = p.read_text()
          if marker not in text:
              raise SystemExit('Missing Fog order marker')
          p.write_text(text.replace(marker, insertion + marker))

          replace(
              'src/state/apply-fog-overlay.ts',
              """  activateFogOfWarOverlayForBattle,
                prioritizeFogOfWarOverlayChoice,
                requireFogOfWarOverlayOrder,
          """.replace('          ', ''),
              """  activateFogOfWarOverlayForBattle,
                consumeFogOfWarOverlayAfterBattle,
                prioritizeFogOfWarOverlayChoice,
                requireFogOfWarOverlayOrder,
          """.replace('          ', ''),
          )
          replace(
              'src/state/apply-fog-overlay.ts',
              """  requireFogOfWarOverlayOrder(game, action);
            const previousBattleId = game.battle?.id;
            const result = applySleeperNetworkGameAction(game, action);

            if (result.state.battle && result.state.battle.id !== previousBattleId) {
              activateFogOfWarOverlayForBattle(result.state);
            }
          """.replace('          ', ''),
              """  requireFogOfWarOverlayOrder(game, action);
            const previousBattle = game.battle ? structuredClone(game.battle) : undefined;
            const previousBattleId = previousBattle?.id;
            const result = applySleeperNetworkGameAction(game, action);

            if (previousBattle?.fogOfWarOverlayOwner
              && (!result.state.battle || result.state.battle.id !== previousBattle.id)) {
              consumeFogOfWarOverlayAfterBattle(result.state, previousBattle);
            }
            if (result.state.battle && result.state.battle.id !== previousBattleId) {
              activateFogOfWarOverlayForBattle(result.state);
            }
          """.replace('          ', ''),
          )
          replace(
              'src/state/intelligence-fog-overlay.test.ts',
              "import { FOG_OF_WAR_OVERLAY } from './intelligence-fog-overlay';",
              "import { consumeFogOfWarOverlayAfterBattle, FOG_OF_WAR_OVERLAY } from './intelligence-fog-overlay';",
          )
          replace(
              'src/state/intelligence-fog-overlay.test.ts',
              """    expect(territoryAt(state, 3).overlays ?? []).not.toContainEqual(expect.objectContaining({ cardId: FOG_OF_WAR_OVERLAY }));
                expect(state.players.player_1.zones.discard).toContain(FOG_OF_WAR_OVERLAY);
          """.replace('          ', ''),
              """    expect(territoryAt(state, 3).overlays).toContainEqual(expect.objectContaining({ cardId: FOG_OF_WAR_OVERLAY }));
                expect(state.players.player_1.zones.discard).not.toContain(FOG_OF_WAR_OVERLAY);
          """.replace('          ', ''),
          )
          p = Path('src/state/intelligence-fog-overlay.test.ts')
          text = p.read_text()
          close = "\n});\n"
          tests = """

            it('moves the Overlay to Discard only after the fought battle ends', () => {
              let state = startBattle(placeFog(game()));
              state.battle!.stage = 'resolution';
              state.battle!.attacker.diceRoll = 6;
              state.battle!.defender.diceRoll = 1;
              state.battle!.effectsResolved.push('before_battle_resolution');

              state = applyGameAction(state, { type: 'resolve_battle', playerId: 'player_1' }).state;

              expect(territoryAt(state, 3).overlays ?? []).not.toContainEqual(expect.objectContaining({ cardId: FOG_OF_WAR_OVERLAY }));
              expect(state.players.player_1.zones.discard).toContain(FOG_OF_WAR_OVERLAY);
            });

            it('does not consume the Overlay when a battle ends before either player commits', () => {
              const state = startBattle(placeFog(game()));
              const battle = structuredClone(state.battle!);
              state.battle = undefined;

              expect(consumeFogOfWarOverlayAfterBattle(state, battle)).toBe(false);
              expect(territoryAt(state, 3).overlays).toContainEqual(expect.objectContaining({ cardId: FOG_OF_WAR_OVERLAY }));
              expect(state.players.player_1.zones.discard).not.toContain(FOG_OF_WAR_OVERLAY);
            });
          """.replace('          ', '')
          if not text.endswith(close):
              raise SystemExit('Unexpected Fog test ending')
          p.write_text(text[:-len(close)] + tests + close)

          # Record currently implemented banked Asset uses for Subversion Mission evidence.
          replace(
              'src/state/military-timing.ts',
              "import { drawFromDeck } from './draw';\nimport { bankedAssetUseAllowed } from './intelligence-subversion-battle';",
              "import { drawFromDeck } from './draw';\nimport { recordBankedAssetUse } from './intelligence-mission-triggers';\nimport { bankedAssetUseAllowed } from './intelligence-subversion-battle';",
          )
          replace(
              'src/state/military-timing.ts',
              """  const index = player.zones.assetBank.indexOf(cardId);
                if (index < 0) throw new Error(`${cardId} is not banked.`);
                player.zones.assetBank.splice(index, 1);
          """.replace('          ', ''),
              """  const index = player.zones.assetBank.indexOf(cardId);
                if (index < 0) throw new Error(`${cardId} is not banked.`);
                if (game.battle) recordBankedAssetUse(game, playerId, game.battle.id, cardId);
                player.zones.assetBank.splice(index, 1);
          """.replace('          ', ''),
          )
          replace(
              'src/state/military-interactions.ts',
              "import { gainFactionResource, setFactionResource } from './resources';",
              "import { recordBankedAssetUse } from './intelligence-mission-triggers';\nimport { gainFactionResource, setFactionResource } from './resources';",
          )
          replace(
              'src/state/military-interactions.ts',
              """  if (assetIndex >= 0) {
                player.zones.assetBank.splice(assetIndex, 1);
          """.replace('          ', ''),
              """  if (assetIndex >= 0) {
                if (game.recentBattleResult) recordBankedAssetUse(game, playerId, game.recentBattleResult.battleId, cardId);
                player.zones.assetBank.splice(assetIndex, 1);
          """.replace('          ', ''),
          )
          replace(
              'src/state/diplomat-cards.ts',
              "import { gainFactionResource } from './resources';",
              "import { recordBankedAssetUse } from './intelligence-mission-triggers';\nimport { gainFactionResource } from './resources';",
          )
          for needle in (
              "removeOne(player.zones.assetBank, assetId);\n  player.zones.discard.push(assetId);",
              "removeOne(player.zones.assetBank, DIPLOMAT_REACTIVE_CARDS.neutralObservers);\n  player.zones.discard.push(DIPLOMAT_REACTIVE_CARDS.neutralObservers);",
              "removeOne(player.zones.assetBank, DIPLOMAT_REACTIVE_CARDS.safeConduct);\n  player.zones.discard.push(DIPLOMAT_REACTIVE_CARDS.safeConduct);",
          ):
              card_expr = (
                  'assetId' if 'assetId' in needle
                  else 'DIPLOMAT_REACTIVE_CARDS.neutralObservers' if 'neutralObservers' in needle
                  else 'DIPLOMAT_REACTIVE_CARDS.safeConduct'
              )
              replacement = needle.split('\n')[0] + f"\n  if (game.battle) recordBankedAssetUse(game, diplomatId, game.battle.id, {card_expr});\n" + needle.split('\n')[1]
              replace('src/state/diplomat-cards.ts', needle, replacement)

          replace(
              'src/state/battle-reveal.ts',
              "import { applySubversionBattleRestrictions } from './intelligence-subversion-battle';",
              "import { recordBankedAssetUse } from './intelligence-mission-triggers';\nimport { applySubversionBattleRestrictions, bankedAssetUseAllowed } from './intelligence-subversion-battle';",
          )
          replace(
              'src/state/battle-reveal.ts',
              """  applySubversionBattleRestrictions(game);
            const effectResult = new EffectRegistry(baseBattleEffectHandlers).resolve({
          """.replace('          ', ''),
              """  applySubversionBattleRestrictions(game);
            const defenderId = battle.defender.playerId;
            if (bankedAssetUseAllowed(game, defenderId)
              && game.players[defenderId].zones.assetBank.includes('card-fortifications')) {
              recordBankedAssetUse(game, defenderId, battle.id, 'card-fortifications');
            }
            const effectResult = new EffectRegistry(baseBattleEffectHandlers).resolve({
          """.replace('          ', ''),
          )
          replace(
              'src/state/reducer.ts',
              "import { drawFromDeck } from './draw';",
              "import { drawFromDeck } from './draw';\nimport { recordBankedAssetUse } from './intelligence-mission-triggers';\nimport { bankedAssetUseAllowed } from './intelligence-subversion-battle';",
          )
          replace(
              'src/state/reducer.ts',
              """  const effectRegistry = new EffectRegistry(baseBattleEffectHandlers);
            const effectResult = effectRegistry.resolve({
              game,
              battle,
              timing: 'before_battle_resolution',
          """.replace('          ', ''),
              """  const defenderId = battle.defender.playerId;
            if (bankedAssetUseAllowed(game, defenderId)
              && game.players[defenderId].zones.assetBank.includes('card-fortifications')) {
              recordBankedAssetUse(game, defenderId, battle.id, 'card-fortifications');
            }
            const effectRegistry = new EffectRegistry(baseBattleEffectHandlers);
            const effectResult = effectRegistry.resolve({
              game,
              battle,
              timing: 'before_battle_resolution',
          """.replace('          ', ''),
          )
          replace(
              'src/state/reducer.ts',
              """  const effectRegistry = new EffectRegistry(baseBattleEffectHandlers);
            const effectResult = effectRegistry.resolve({
              game,
              battle,
              timing: 'after_battle_resolution',
          """.replace('          ', ''),
              """  if (battle.winner
              && bankedAssetUseAllowed(game, battle.winner)
              && game.players[battle.winner].zones.assetBank.includes('card-attrition')) {
              recordBankedAssetUse(game, battle.winner, battle.id, 'card-attrition');
            }
            const effectRegistry = new EffectRegistry(baseBattleEffectHandlers);
            const effectResult = effectRegistry.resolve({
              game,
              battle,
              timing: 'after_battle_resolution',
          """.replace('          ', ''),
          )
          replace(
              'src/state/intelligence-treason.ts',
              "import { wasBattleCardObservedBeforeNormalReveal } from './battle-observation';",
              "import { wasBattleCardObservedBeforeNormalReveal } from './battle-observation';\nimport { recordBankedAssetUse } from './intelligence-mission-triggers';",
          )
          replace(
              'src/state/intelligence-treason.ts',
              """  if (index < 0) throw new TreasonError('Treason is no longer banked.');
            player.zones.assetBank.splice(index, 1);
          """.replace('          ', ''),
              """  if (index < 0) throw new TreasonError('Treason is no longer banked.');
            if (game.battle) recordBankedAssetUse(game, playerId, game.battle.id, TREASON);
            player.zones.assetBank.splice(index, 1);
          """.replace('          ', ''),
          )
          replace(
              'src/state/intelligence-reactive-assets.ts',
              """  removeOne(player.zones.assetBank, INTELLIGENCE_REACTIVE_ASSETS.deepCover);
            player.zones.graveyard.push(INTELLIGENCE_REACTIVE_ASSETS.deepCover);
          """.replace('          ', ''),
              """  removeOne(player.zones.assetBank, INTELLIGENCE_REACTIVE_ASSETS.deepCover);
            if (game.battle) recordBankedAssetUse(game, action.playerId, game.battle.id, INTELLIGENCE_REACTIVE_ASSETS.deepCover);
            player.zones.graveyard.push(INTELLIGENCE_REACTIVE_ASSETS.deepCover);
          """.replace('          ', ''),
          )
          replace(
              'src/state/intelligence-sleeper-network.ts',
              "import type { ActionCardTarget, ResolveIntelligenceChoiceAction } from './actions';",
              "import type { ActionCardTarget, ResolveIntelligenceChoiceAction } from './actions';\nimport { recordBankedAssetUse } from './intelligence-mission-triggers';",
          )
          replace(
              'src/state/intelligence-sleeper-network.ts',
              """  state.activation = {
                mode: 'compromised',
          """.replace('          ', ''),
              """  if (game.battle) recordBankedAssetUse(game, playerId, game.battle.id, SLEEPER_NETWORK);
            state.activation = {
              mode: 'compromised',
          """.replace('          ', ''),
          )
          replace(
              'src/state/intelligence-subversion-asset.ts',
              """  if (action.choice === 'pass') {
                publicLog(game, action.playerId, 'intelligence_subversion_asset_passed', `${game.players[action.playerId].name} allowed ${pending.effectLabel} to resolve.`, {
          """.replace('          ', ''),
              """  if (action.choice === 'pass') {
                if (game.battle) recordBankedAssetUse(game, pending.targetOwner, game.battle.id, pending.targetCardId);
                publicLog(game, action.playerId, 'intelligence_subversion_asset_passed', `${game.players[action.playerId].name} allowed ${pending.effectLabel} to resolve.`, {
          """.replace('          ', ''),
          )

          # Focused audit coverage for Action legality and passive Asset Mission evidence.
          Path('src/state/intelligence-integration-audit.test.ts').write_text("""import { describe, expect, it } from 'vitest';
          import type { BattleParticipantState, GameState, PlayerID } from '../types';
          import { applyGameAction } from './apply-subversion-asset';
          import { canResolveIntelligenceAction } from './intelligence-action-cards';
          import { initializeGame } from './initialize';

          function participant(playerId: PlayerID): BattleParticipantState {
            return {
              playerId,
              passedHandCommit: true,
              passedBattleDrawPlay: true,
              hasDrawnBattleCards: true,
              battleDraw: [],
              battleDrawPlayed: [],
              battleDrawCount: 3,
              battleDrawPlayLimit: 1,
              rerollsRemaining: 0,
              modifiers: 0,
              retreated: false,
            };
          }

          function game(): GameState {
            return initializeGame({
              id: 'intelligence-integration-audit',
              version: 'v0.6.0',
              openingHandSize: 0,
              shuffleDecks: false,
              players: [
                { id: 'player_1', name: 'Intelligence', factionId: 'intelligence', leaderName: 'Ranger', deck: ['a1', 'a2', 'a3'], territories: ['t1', 't2', 't3'] },
                { id: 'player_2', name: 'Opponent', factionId: 'military', leaderName: 'General', deck: ['d1', 'd2', 'd3'], territories: ['t4', 't5', 't6'] },
              ],
            });
          }

          describe('Intelligence integration audit', () => {
            it('does not offer Assassins without a card to discard from the opposing hand', () => {
              const state = game();
              expect(canResolveIntelligenceAction(state, 'player_1', 'intelligence-assassins')).toBe(false);
              state.players.player_2.zones.hand.push('target-card');
              expect(canResolveIntelligenceAction(state, 'player_1', 'intelligence-assassins')).toBe(true);
            });

            it('does not offer Operational Reassessment without another eligible Mission card', () => {
              const state = game();
              state.players.player_1.intelligence!.activeMission = {
                cardId: 'intelligence-spies', kind: 'normal', startedTurn: 1,
                requirementSatisfied: false, evidence: [],
              };
              expect(canResolveIntelligenceAction(state, 'player_1', 'intelligence-operational-reassessment')).toBe(false);
              state.players.player_1.zones.hand.push('intelligence-fog-of-war');
              expect(canResolveIntelligenceAction(state, 'player_1', 'intelligence-operational-reassessment')).toBe(true);
            });

            it('records passive Fortifications as opposing Asset use for a Subversion Mission', () => {
              let state = game();
              const territories = state.board.spaces.filter((space) => space.kind === 'territory');
              const origin = territories[1];
              const location = territories[2];
              for (const space of state.board.spaces) space.occupant = undefined;
              origin.occupant = 'player_1';
              location.occupant = 'player_2';
              location.controller = 'player_2';
              state.players.player_1.occupiedSpaceId = origin.id;
              state.players.player_2.occupiedSpaceId = location.id;
              state.players.player_2.zones.assetBank = ['card-fortifications'];
              state.players.player_1.intelligence!.activeMission = {
                cardId: 'intelligence-subversion', kind: 'normal', startedTurn: 1,
                startedLogIndex: 0, requirementSatisfied: false, evidence: [],
              };
              state.turn = 2;
              state.phase = 'battle';
              state.activePlayer = 'player_1';
              state.priorityPlayer = 'player_1';
              state.battle = {
                id: 'battle-audit', stage: 'dice', location: location.id, attackerOrigin: origin.id,
                attacker: participant('player_1'), defender: participant('player_2'),
                tiePolicy: 'defender', effectsResolved: [],
              };

              state = applyGameAction(state, { type: 'resolve_battle_reveal', playerId: 'player_1' }).state;
              state.battle!.attacker.diceRoll = 6;
              state.battle!.defender.diceRoll = 1;
              state.battle!.stage = 'resolution';
              state = applyGameAction(state, { type: 'resolve_battle', playerId: 'player_1' }).state;

              expect(state.players.player_1.intelligence?.activeMission?.requirementSatisfied).toBe(true);
            });
          });
          """.replace('          ', ''))

          # Restore standard CI and remove the temporary audit packaging.
          Path('.github/workflows/test.yml').write_text("""name: Test

          on:
            pull_request:
            push:
              branches:
                - main

          jobs:
