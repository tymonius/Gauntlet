name: Apply Dark Omens test fixture fixes

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Dark Omens branch
        uses: actions/checkout@v4
        with:
          ref: feature/mystics-dark-omens
          fetch-depth: 0

      - name: Correct test fixtures and restore CI
        shell: python
        run: |
          from pathlib import Path

          conversion = Path('src/state/mystics-conversion.test.ts')
          text = conversion.read_text()
          text = text.replace("'mystics-dark-omens'", "'mystics-fates-toll'")
          conversion.write_text(text)

          dark_omens = Path('src/state/mystics-dark-omens.test.ts')
          text = dark_omens.read_text()
          old = "    stage: 'normal_reveal',"
          new = "    stage: 'dice',"
          if old not in text:
              raise SystemExit('Expected Dark Omens reveal-stage fixture not found')
          dark_omens.write_text(text.replace(old, new))

          Path('.github/workflows/test.yml').write_text("""name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
""")

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/state/mystics-conversion.test.ts src/state/mystics-dark-omens.test.ts .github/workflows/test.yml
          git commit -m "Correct Dark Omens test fixtures and restore CI"
          git push origin HEAD:feature/mystics-dark-omens
