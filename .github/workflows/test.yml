name: Apply Mystics Rite type fixes

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mystics branch
        uses: actions/checkout@v4
        with:
          ref: feature/mystics-rite-integration
          fetch-depth: 0

      - name: Apply type-boundary fixes
        shell: python
        run: |
          from pathlib import Path

          def replace(path, old, new):
              target = Path(path)
              text = target.read_text()
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old!r}")
              target.write_text(text.replace(old, new))

          replace(
              "src/state/apply-intelligence.ts",
              "import type { AppStateAction, PlayBattleDrawCardAction } from './actions';",
              "import type { AppStateAction, PlayBattleDrawCardAction, StateAction } from './actions';",
          )
          replace(
              "src/state/apply-intelligence.ts",
              "  const result = applyBaseGameAction(game, action);\n  if (action.type === 'move_player'",
              "  const result = applyBaseGameAction(game, action as StateAction);\n  if (action.type === 'move_player'",
          )
          replace(
              "src/state/mystics-rite-integration.ts",
              "      if (game.phase === 'game_over') return;",
              "      if (game.winner) return;",
          )
          replace(
              "src/state/mystics-rite-integration.ts",
              "  if (game.phase !== 'turn_start' || game.phase === 'game_over') return;",
              "  if (game.phase !== 'turn_start') return;",
          )

          Path('.github/workflows/test.yml').write_text("""name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
""")

      - name: Commit fixes and restore CI
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/state/apply-intelligence.ts src/state/mystics-rite-integration.ts .github/workflows/test.yml
          git commit -m "Fix Mystics Rite type boundaries and restore CI"
          git push origin HEAD:feature/mystics-rite-integration
