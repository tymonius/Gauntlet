name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/tighten-diplomat-card-text
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore historical sources and commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- \
            docs/Gauntlet_Development_History_and_Superseded_Directions.md \
            docs/Gauntlet_v0.6_Card_Review_Log.md \
            docs/card-reviews/CONDITION_AUDIT.md \
            docs/card-reviews/COST_CURVE_AND_NEUTRAL_POOL_AUDIT.md \
            docs/v0.5.7_rules_clarifications.md
          git show origin/main:.github/workflows/test.yml > .github/workflows/test.yml
          rm -f diplomat-cleanup-trigger.txt
          node --check faction-sheets/diplomat.js
          git add -A
          git commit -m "Preserve historical Diplomat terminology"
          git push origin HEAD:agent/tighten-diplomat-card-text

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
