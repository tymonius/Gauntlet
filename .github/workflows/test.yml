name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Package audit sources
        if: always()
        run: tar -czf intelligence-audit-source.tar.gz src releases/v0.6.0 docs package.json 2>/dev/null || tar -czf intelligence-audit-source.tar.gz src releases/v0.6.0 package.json

      - name: Upload audit sources
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intelligence-audit-source
          path: intelligence-audit-source.tar.gz
