name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/polish-diplomat-faction-sheets
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Remove generated render files
        run: |
          git fetch origin main
          git checkout origin/main -- package-lock.json
          rm -rf rendered-diplomat
          cat > .github/workflows/test.yml <<'YAML'
          name: Test

          on:
            pull_request:
            push:
              branches:
                - main

          jobs:
            test:
              runs-on: ubuntu-latest

              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22

                - name: Install dependencies
                  run: npm install

                - name: Typecheck
                  run: npm run typecheck

                - name: Test
                  run: npm test
          YAML

      - name: Validate production sources
        run: |
          node --check faction-sheets/diplomat.js
          npm ci
          npm run typecheck
          npm test

      - name: Commit clean production diff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove generated Diplomat render artifacts"
          git push origin HEAD:agent/polish-diplomat-faction-sheets
