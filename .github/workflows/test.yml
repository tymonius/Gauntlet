name: Test

on:
  push:
    branches:
      - feature/intelligence-sleeper-network

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/intelligence-sleeper-network
          fetch-depth: 0

      - name: Patch type boundaries and restore workflow
        shell: python
        run: |
          from pathlib import Path

          intelligence = Path('src/types/intelligence.ts')
          text = intelligence.read_text()
          for kind in (
              'sleeper_network_initial_card',
              'sleeper_network_add_card',
              'sleeper_network_capacity',
              'sleeper_network_activate',
              'sleeper_network_play_card',
              'sleeper_network_compromised',
          ):
              old = f"kind: '{kind}';\n      playerId: PlayerID;"
              new = f"kind: '{kind}';\n      playerId: PlayerID;\n      battleId?: never;"
              if old not in text:
                  raise SystemExit(f'Missing pending choice block: {kind}')
              text = text.replace(old, new)
          intelligence.write_text(text)

          game_types = Path('src/types/game.ts')
          text = game_types.read_text()
          text = text.replace(
              'export interface PrivateGameView extends PublicGameView {',
              "export interface PrivateGameView extends Omit<PublicGameView, 'players'> {",
          )
          game_types.write_text(text)

          test = Path('src/state/intelligence-sleeper-network.test.ts')
          text = test.read_text()
          old = "expect(privateView.players.player_1.intelligence?.sleeperNetwork?.cards).toEqual(['card-attrition']);"
          new = """const privatePlayer = privateView.players.player_1;
              if (!('private' in privatePlayer)) throw new Error('Expected the viewer private player state.');
              expect(privatePlayer.intelligence?.sleeperNetwork?.cards).toEqual(['card-attrition']);"""
          if old not in text:
              raise SystemExit('Missing private-view assertion')
          test.write_text(text.replace(old, new))

          Path('.github/workflows/test.yml').write_text("""name: Test

          on:
            pull_request:
            push:
              branches:
                - main

          jobs:
            test:
              runs-on: ubuntu-latest

              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22

                - name: Install dependencies
                  run: npm install

                - name: Typecheck
                  run: npm run typecheck

                - name: Test
                  run: npm test
          """.replace('          ', ''))

      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/types/intelligence.ts src/types/game.ts src/state/intelligence-sleeper-network.test.ts .github/workflows/test.yml
          git commit -m "Fix Sleeper Network type boundaries"
          git push origin HEAD:feature/intelligence-sleeper-network
