name: Apply Mystics faction rename

on:
  push:
    branches:
      - rename-arcane-faction-to-mystics
    paths:
      - tools/apply_mystics_rename.py
      - .github/workflows/apply-mystics-rename.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rename branch
        uses: actions/checkout@v4
        with:
          ref: rename-arcane-faction-to-mystics
          fetch-depth: 0

      - name: Install document tools
        run: |
          python -m pip install --disable-pip-version-check python-docx
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils

      - name: Apply faction rename
        run: python tools/apply_mystics_rename.py

      - name: Regenerate Inquisition PDF
        shell: bash
        run: |
          set -euo pipefail
          DOCX="releases/v0.6/faction-guides/inquisition/Gauntlet_v0.6_Inquisition_Faction_Guide.docx"
          PDF="releases/v0.6/faction-guides/inquisition/Gauntlet_v0.6_Inquisition_Faction_Guide.pdf"
          OUT="$(mktemp -d)"
          libreoffice --headless --convert-to pdf --outdir "$OUT" "$DOCX"
          cp "$OUT/$(basename "${PDF}")" "$PDF"
          test "$(pdfinfo "$PDF" | awk '/^Pages:/ {print $2}')" = "8"
          pdftotext "$PDF" - | grep -F "not every Arcane card belongs to"
          pdftotext "$PDF" - | grep -F "Mystics"

      - name: Run project checks
        run: |
          npm install
          npm run typecheck
          npm test

      - name: Commit synchronized rename
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs releases/v0.6 deckbuilder-v0.6 faction-sheets
          if git diff --cached --quiet; then
            echo "No rename changes to commit."
            exit 0
          fi
          git commit -m "Rename Arcane faction to Mystics"
          git push origin HEAD:rename-arcane-faction-to-mystics
