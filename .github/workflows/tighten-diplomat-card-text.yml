    <div class="reference-subtitle">Side A — Offering Terms</div>
    <div class="fit-content">
      <div class="reference-step"><strong>Before a battle involving you:</strong></div>
      <ol class="reference-list">
        <li>Choose an eligible Proposal.</li>
        <li>Lower Influence by its listed Stake.</li>
        <li>The opponent accepts or refuses.</li>
      </ol>
      <div class="reference-block"><strong>Accepted:</strong> No battle occurs. Resolve the Accepted effect and return the stake. If newly ratified, flip the Proposal and gain Influence equal to its Stake.</div>
      <div class="reference-block"><strong>Refused:</strong> Resolve the Refused effect, then battle. Before dice, you may use Leverage.</div>
      <ul class="reference-list">
        <li><strong>You win:</strong> Impose the Proposal and return the stake. If newly ratified, flip it and gain 1 Influence unless stated otherwise.</li>
        <li><strong>You lose:</strong> Do not ratify it. Lose the stake.</li>
        <li><strong>No winner:</strong> Do not ratify it. Return the stake.</li>
      </ul>
    </div>
    <div class="pair-key">Reference side A • Pair with Reference side B</div>
  </article>`;
}

function renderReferenceB() {
  return `<article class="print-card reference-card fit-card">
    <div class="reference-heading">INFLUENCE & TREATY</div>
    <div class="reference-subtitle">Side B — Resource and Victory</div>
    <div class="fit-content">
      <div class="reference-block"><strong>Influence:</strong> Track available Influence from 0 to 10. Excess gains are lost.</div>
      <div class="reference-block"><strong>Staking:</strong> Lower the tracker by the Proposal’s Stake. That Influence is unavailable until Terms resolve.</div>
      <div class="reference-block"><strong>Leverage:</strong> Before dice in a battle following refused Terms, spend any amount of available Influence for +1 battle total each.</div>
      <div class="reference-block"><strong>Treaty Articles:</strong> A ratified Proposal may be offered again, but cannot be ratified again or grant normal newly-ratified Influence rewards.</div>
      <div class="reference-block"><strong>Peace Treaty:</strong> At the start of your turn, after captures, five different Treaty Articles win the game.</div>
    </div>
    <div class="pair-key">Reference side B • Pair with Reference side A</div>
  </article>`;
}

'''
          Path(js).write_text(text[:a0] + refs + text[b1:])
          replace_once(js, '<div class="tracker-note">Place beneath the selected Leader Card. Fully align at 0; slide the Leader upward until its bottom edge aligns with the current Influence line.</div>', '<div class="tracker-note">Slide your Leader Card until its lower edge aligns with your current Influence. Fully cover this card at 0. Maximum 10.</div>')

          # Add the card-replacement question to active design/test rollups.
          design = 'docs/Gauntlet_v0.6_Diplomat_Design_Notes.md'
          replace_once(design, '- Are accepted effects attractive enough that refusal is not automatic even though paid acceptance also grows Influence?', '- Are accepted effects attractive enough that refusal is not automatic even though paid acceptance also grows Influence?\n- Do Trade Concessions and Nonbinding Resolution provide enough replacement draw for out-of-turn Diplomat interactions without creating excessive card advantage?')
          openq = 'docs/Gauntlet_v0.6_Open_Questions.md'
          replace_once(openq, '- Are accepted effects attractive enough that refusal is not automatic even though paid acceptance also grows Influence?', '- Are accepted effects attractive enough that refusal is not automatic even though paid acceptance also grows Influence?\n- Do Trade Concessions and Nonbinding Resolution provide enough replacement draw for out-of-turn Diplomat interactions without creating excessive card advantage?')
          metrics = 'docs/Gauntlet_Playtest_Targets_and_Metrics.md'
          replace_once(metrics, '- Influence gained separately from accepted newly ratified Proposals, imposed newly ratified Proposals, Clemency, Nonbinding Resolution, Sanctions: Blockade, and any other source;', '- Influence gained separately from accepted newly ratified Proposals, imposed newly ratified Proposals, Clemency, Nonbinding Resolution, Sanctions: Blockade, and any other source;\n- cards drawn through Trade Concessions, Nonbinding Resolution, Cordiality, Clemency, Sanctions: Censure, and other Diplomat effects;')

          # Remove temporary workflow from the final diff.
          Path('.github/workflows/tighten-diplomat-card-text.yml').unlink()

          # Stale-text and exact-name guards.
          forbidden = [
              'Political Capital may recover it',
              "name: 'Censure'", "name: 'Embargo'", "name: 'Blockade'",
              'Then discard Trade Concessions.',
              'After the accepted Terms resolve, discard Nonbinding Resolution.',
              'before the resulting battle',
          ]
          scan_files = [Path(pool), Path(supp), Path(rules), Path(js)]
          for file in scan_files:
              content = file.read_text()
              for phrase in forbidden:
                  if phrase in content:
                      raise SystemExit(f'Stale phrase remains in {file}: {phrase}')

          # Confirm the two approved draw additions appear in source and renderer.
          for file in [Path(pool), Path(js)]:
              content = file.read_text()
              for phrase in ['Then discard this and draw one card.', 'After Terms resolve, discard this, then draw one card.']:
                  if phrase not in content:
                      raise SystemExit(f'Missing approved replacement draw in {file}: {phrase}')
          PY

