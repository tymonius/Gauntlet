> **Treaty Articles:** A ratified Proposal may be offered again, but cannot be ratified again or grant normal newly-ratified Influence rewards.
>
> **Peace Treaty:** At the start of your turn, after captures, five different Treaty Articles win the game.'''
          replace_between(supp, '## Diplomat Reference card\n', '---\n\n## Print-sheet integration', reference_block)

          # Central Working Rules repeat Proposal and leader exact text.
          rules = 'docs/Gauntlet_v0.6_Working_Rules.md'
          rules_proposals = proposal_block.replace('### 1. De-escalation', '### 1. De-escalation')
          replace_between(rules, '### 1. De-escalation\n', '### Ambassador', rules_proposals)
          replace_once(rules, '**Cordiality:** Once per turn, after the opponent accepts Terms you offered, draw one card.', '**Cordiality:** Once per turn, after the opponent accepts your Terms, draw one card.')
          replace_once(rules, '**Political Capital:** Once per turn, when you would lose staked Influence because you lost the battle after refused Terms, you may send up to that many cards from your hand to your Graveyard. Recover 1 of that staked Influence for each card sent this way; lose the rest.', '**Political Capital:** Once per turn, when you would lose staked Influence after losing a battle following refused Terms, you may send up to that many cards from hand to your Graveyard. Recover 1 staked Influence per card sent; lose the rest.')

          # Rebuild printable data and player-facing references from the approved text.
          js = 'faction-sheets/diplomat.js'
          p = Path(js)
          text = p.read_text()
          data = r'''const cards = [
