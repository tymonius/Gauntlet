name: Finalize Reconnaissance tests

on:
  push:
    branches:
      - feature/intelligence-reconnaissance-battle

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/intelligence-reconnaissance-battle
          fetch-depth: 0

      - name: Fix assertion and restore workflow
        shell: python
        run: |
          from pathlib import Path

          test = Path('src/state/intelligence-reconnaissance-battle.test.ts')
          text = test.read_text()
          text = text.replace(
              """    expect(state.battle?.attacker.handCommit).toMatchObject({
                    faceDown: false,
                    earlyEffectResolved: true,
                    postRevealEffectResolved: undefined,
                  });
              """,
              """    expect(state.battle?.attacker.handCommit).toMatchObject({
                    faceDown: false,
                    earlyEffectResolved: true,
                  });
                  expect(state.battle?.attacker.handCommit?.postRevealEffectResolved).toBeUndefined();
              """,
          )
          test.write_text(text)

          Path('.github/workflows/test.yml').write_text("""name: Test

          on:
            pull_request:
            push:
              branches:
                - main

          jobs:
            test:
              runs-on: ubuntu-latest

              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22

                - name: Install dependencies
                  run: npm install

                - name: Typecheck
                  run: npm run typecheck

                - name: Test
                  run: npm test
          """.replace('          ', ''))

          Path('.github/workflows/finalize-reconnaissance-tests.yml').unlink()

      - name: Commit cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/state/intelligence-reconnaissance-battle.test.ts .github/workflows/test.yml .github/workflows/finalize-reconnaissance-tests.yml
          git commit -m "Fix Reconnaissance timing assertion"
          git push origin HEAD:feature/intelligence-reconnaissance-battle
