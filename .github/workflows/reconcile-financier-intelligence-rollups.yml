name: Reconcile Financier and Intelligence rollups

on:
  push:
    branches:
      - agent/finalize-financier-faction-guide
    paths:
      - .github/workflows/reconcile-financier-intelligence-rollups.yml

permissions:
  contents: write

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finalize-financier-faction-guide
          fetch-depth: 0

      - name: Reconcile milestone rollups
        run: python scripts/reconcile_financier_intelligence_rollups.py

      - name: Validate and commit
        run: |
          test -f docs/Gauntlet_v0.6_Intelligence_Card_Pool.md
          grep -q '112 current playable-card designs' docs/Gauntlet_v0.6_Card_Metadata.md
          grep -q 'Last completed definitive faction guide.*Financiers' docs/card-reviews/STATUS.md
          rm .github/workflows/reconcile-financier-intelligence-rollups.yml
          rm scripts/reconcile_financier_intelligence_rollups.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Reconcile Financier guide with Intelligence milestone'
          git push origin HEAD:agent/finalize-financier-faction-guide
