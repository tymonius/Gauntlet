name: Apply Google Analytics tag

on:
  push:
    branches:
      - agent/add-google-analytics

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/add-google-analytics

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Add Google Analytics to HTML pages
        run: node scripts/sync-google-analytics.mjs

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-google-analytics.yml
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add Google Analytics tracking"
          git push
