name: Render v0.6.0 card sheets

on:
  pull_request:
    branches: [main]
    paths:
      - releases/v0.6.0/Gauntlet_v0.6.0_Canonical_Data.json
      - faction-sheets/*.html
      - faction-sheets/*.css
      - faction-sheets/*.js
      - images/**
      - scripts/build-v0.6.0-card-sheets.mjs
      - scripts/print-v0.6.0-card-sheets.mjs
      - scripts/render-v0.6.0-card-sheets.sh
      - scripts/make-pdf-contact-sheets.py
      - scripts/commit-generated-files.mjs
      - .github/workflows/render-v0.6.0-cards.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install rendering tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils fonts-noto-core fonts-noto-extra
          python3 -m pip install Pillow
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Render and validate card sheets
        run: |
          set +e
          bash scripts/render-v0.6.0-card-sheets.sh > card-build.log 2>&1
          status=$?
          cat card-build.log
          if [ "$status" -ne 0 ]; then
            cp card-build.log releases/v0.6.0/Gauntlet_v0.6.0_Card_Build_Error.txt
            node scripts/commit-generated-files.mjs \
              "Record v0.6.0 card build error [skip ci]" -- \
              releases/v0.6.0/Gauntlet_v0.6.0_Card_Build_Error.txt || true
            exit "$status"
          fi

      - name: Commit rendered card PDFs
        run: |
          rm -f releases/v0.6.0/Gauntlet_v0.6.0_Card_Build_Error.txt
          set +e
          node scripts/commit-generated-files.mjs \
            "Render v0.6.0 card and component PDFs [skip ci]" -- \
            releases/v0.6.0/Gauntlet_v0.6.0_Neutral_Cards.pdf \
            releases/v0.6.0/Gauntlet_v0.6.0_Territories.pdf \
            releases/v0.6.0/Gauntlet_v0.6.0_Military_Cards_and_Components.pdf \
            releases/v0.6.0/Gauntlet_v0.6.0_Diplomat_Cards_and_Components.pdf \
            releases/v0.6.0/Gauntlet_v0.6.0_Financier_Cards_and_Components.pdf \
            releases/v0.6.0/Gauntlet_v0.6.0_Intelligence_Cards_and_Components.pdf \
            releases/v0.6.0/Gauntlet_v0.6.0_Mystics_Cards_and_Components.pdf \
            releases/v0.6.0/Gauntlet_v0.6.0_Inquisition_Cards_and_Components.pdf \
            releases/v0.6.0/Gauntlet_v0.6.0_All_Cards_and_Components.pdf \
            releases/v0.6.0/Gauntlet_v0.6.0_Card_Build_Error.txt \
            > card-commit.log 2>&1
          status=$?
          cat card-commit.log
          exit "$status"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gauntlet-v0.6.0-card-sheets
          path: |
            card-build.log
            card-commit.log
            releases/v0.6.0/Gauntlet_v0.6.0_*Cards*.pdf
            releases/v0.6.0/Gauntlet_v0.6.0_Territories.pdf
            releases/v0.6.0/Gauntlet_v0.6.0_Card_Build_Error.txt
            build/v0.6.0/card-validation/*contact*.png
          if-no-files-found: ignore
