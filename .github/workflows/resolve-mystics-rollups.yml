name: Resolve remaining Mystics rollup conflicts

on:
  push:
    branches:
      - agent/mystics-rebase-test
    paths:
      - .github/workflows/resolve-mystics-rollups.yml

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mystics-rebase-test
      - name: Resolve rollups
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def resolve(path,resolvers):
              p=Path(path); text=p.read_text(encoding='utf-8')
              ms=list(re.finditer(r'<<<<<<< ours\n(.*?)=======\n(.*?)>>>>>>> theirs\n?',text,re.S))
              assert len(ms)==len(resolvers),(path,len(ms),len(resolvers))
              out=[]; pos=0
              for m,r in zip(ms,resolvers):
                  out.append(text[pos:m.start()]); out.append(r(m.group(1),m.group(2)).rstrip()+'\n'); pos=m.end()
              out.append(text[pos:]); text=''.join(out)
              text=text.replace('Catalysis','Materia Prima').replace('The Circle Holds','Guardians of the Circle')
              assert '<<<<<<<' not in text and '=======' not in text and '>>>>>>>' not in text,path
              p.write_text(text,encoding='utf-8')

          C=lambda s:(lambda o,t:s)

          resolve('README.md',[
            C('- **Completed faction pools:** Military, Diplomats, Inquisition, Mystics, Financiers, and Intelligence\n- **Current playable designs:** 122\n- **Preliminary v0.6 core rulebook:** self-contained shared rules draft at `releases/v0.6/Gauntlet_v0.6_Preliminary_Core_Rules.md`\n- **Definitive faction guides:** all six factions are packaged in Markdown, DOCX, and PDF under `releases/v0.6/faction-guides/`\n- **Territory review:** complete for all 25 v0.5.7 Territories and Arenas; exact text consolidated in `docs/Gauntlet_v0.6_Territory_Pool.md`\n- **Conditions:** retired as a v0.6 game concept; persistent effects now use Assets, Overlays, or immediate/self-tracking resolution\n- **v0.6 deckbuilder:** live and reading the active Neutral, Military, Diplomat, Inquisition, Financier, Intelligence, and Territory Markdown sources; Mystics integration remains a production follow-up'),
            lambda o,t:t.rstrip()+'\n\n'+o.rstrip(),
            lambda o,t:o.rstrip()+'\n- `releases/v0.6/faction-guides/mystics/Gauntlet_v0.6_Mystics_Faction_Guide.md` — definitive Mystics rules, leaders, Rites, components, strategy, and exact card pool;',
            C('Browser-printable working sheets for v0.6 faction cards and supplemental components. Military, Inquisition, and Intelligence have complete two-sheet packages; Diplomats have a four-sheet package with duplex Proposal / Treaty Article faces. See `faction-sheets/README.md` for rendered links and instructions.\n\nThe Military, Diplomat, Inquisition, and Intelligence sheets are derived production files governed by their definitive faction guides. Dedicated Financier and Mystics browser-printable sheets remain production tasks.')
          ])

          resolve('docs/Gauntlet_v0.6_Card_Metadata.md',[
            C('**Status:** Consolidated metadata rollup through 122 current playable-card designs: 50 Neutral cards and 12 cards for each of Military, Diplomats, Inquisition, Mystics, Financiers, and Intelligence.\n\n`card-reviews/STATUS.md` records the live checkpoint. `Gauntlet_v0.6_Neutral_Card_Pool.md` and the definitive Military, Diplomat, Inquisition, Mystics, Financier, and Intelligence faction guides are authoritative for their completed pools. The definitive faction guides also govern leaders, resources, components, strategy, terminology, and player-facing faction rules. The consolidated Card Review Log, source registry below, and standalone reviews remain migration and design provenance.\n\nThe 54-row source registry preserves the v0.5.7 migration record. It is not itself a count of current playable designs: Militias and Patriotism are retained below as retired source entries, while newly created faction cards appear only in their active package tables.'),
            lambda o,t:t.split('## Active Financier package metadata',1)[0].rstrip()+'\n\n'+o.rstrip(),
            C('- **Manifest Destiny** is Neutral, cost 5, Advanced, and Unique: maximum one copy per deck.\n- **Shock and Awe** is Military, cost 5, Advanced, and Unique: maximum one copy per deck.\n- **Necromancy** is Mystics, cost 5, Advanced, and Unique: maximum one copy per deck.\n- **Corner the Market** is Financier, cost 5, Advanced, and Unique: maximum one copy per deck.\n- **Sleeper Network** is Intelligence, cost 5, Advanced, and Unique: maximum one copy per deck.'),
            C('- The Mystics pool contains exactly 12 unique cards with the approved 1 / 3 / 4 / 3 / 1 cost curve, total value 36, and average value 3.00; its definitive source is the release faction guide.\n- The Financier pool contains exactly 12 unique cards with the approved 1 / 3 / 4 / 3 / 1 cost curve, total value 36, and average value 3.00; its definitive source is the release faction guide.\n- The Intelligence pool contains exactly 12 unique cards with the approved 1 / 3 / 4 / 3 / 1 cost curve, total value 36, and average value 3.0; its definitive source is the release faction guide.\n- The current project contains 122 playable-card designs: 50 Neutral and 12 for each of Military, Diplomats, Inquisition, Mystics, Financiers, and Intelligence.\n- Remaining work concerns shared copied-effect validation, faction-package playtesting and physical review, Mystics and Financier production integration, and canonical-data production.')
          ])

          resolve('docs/Gauntlet_v0.6_Open_Questions.md',[
            C('- twelve-card Military, Diplomat, Inquisition, Mystics, Financier, and Intelligence packages;\n- Intelligence Mission requirements and exact card text;\n- supplemental-component specifications for all six factions, with printable sheets complete for Military, Diplomats, Inquisition, and Intelligence;\n- definitive faction guides for all six factions in Markdown, DOCX, and PDF formats.'),
            C('- Validate impossible-target and source-dependent copied-effect handling generally, including Treason.\n- Playtest the Mystics, Financier, and Intelligence definitive guides and complete the remaining Mystics and Financier printable-package work.'),
            lambda o,t:o,
            lambda o,t:o
          ])

          resolve('docs/card-reviews/STATUS.md',[
            C('**Last completed faction pool:** Mystics  \n**Last completed definitive faction guide:** Mystics  '),
            C('**Mystics pool:** Complete at 12 cards; definitive faction guide packaged  \n**Financier pool:** Complete at 12 cards; definitive faction guide packaged  \n**Intelligence pool:** Complete at 12 cards; definitive faction guide packaged  \n**Current playable designs:** 122  \n**Conditions:** Retired as a v0.6 game concept\n\nThe 122 current designs comprise 50 Neutral and 12 for each of Military, Diplomats, Inquisition, Mystics, Financiers, and Intelligence.'),
            lambda o,t:o.rstrip()+'\n7. `../../releases/v0.6/faction-guides/mystics/Gauntlet_v0.6_Mystics_Faction_Guide.md` — definitive Mystics rules and exact card pool',
            C('Definitive faction guides and completed exact-text pool documents override migration records and historical sidecars where they differ. Earlier split Military, Diplomat, Inquisition, Mystics, Financier, and Intelligence package documents have been consolidated, removed, or superseded by their definitive guides.'),
            lambda o,t:o.rstrip()+'\n- Mystics bound-card handling, additional Battle-card sources, repeated Battle-effect limits, Graveyard-entry timing, Overlay ownership, and dormant-Overlay removal conditions.',
            lambda o,t:t.split('### Financiers',1)[0].rstrip()+'\n\n'+o.rstrip(),
            C('- Validate impossible-target and source-dependent copied-effect handling generally, including Treason.\n- Playtest and physically review all completed packages, with special attention to Mystics Graveyard recursion, Rite pacing, leader balance, and the Inquisition matchup.\n- Complete dedicated Mystics and Financier printable sheets and Mystics deckbuilder integration.'),
            C('Playtest the definitive Mystics, Financier, and Intelligence guides alongside the established factions. Complete the remaining Mystics and Financier production integration, and reopen a definitive roster only when testing reveals a strategic, balance, wording, or production failure.')
          ])

          resolve('releases/v0.6/Gauntlet_v0.6_Preliminary_Core_Rules.md',[
            C('- **Mystics** — Alchemist or Spirit Walker\n- **Financiers** — Banker or Executive\n\nIntelligence remains in release development for this shared-rulebook integration. This draft should not be treated as final canonical v0.6 data until cross-card interactions, physical review, and canonical data are complete.'),
            C('- `faction-guides/mystics/Gauntlet_v0.6_Mystics_Faction_Guide.md`\n- `faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.md`'),
            C('| Mystics | Run the Gauntlet or Ritual |\n| Financiers | Run the Gauntlet or Controlling Interest |'),
            lambda o,t:t.rstrip()+'\n\n'+o.rstrip()
          ])

          for path in ['docs/Gauntlet_v0.6_Project_Index.md','docs/Gauntlet_v0.6_Working_Rules.md','docs/Gauntlet_v0.6_Leader_Design_Bible.md','releases/v0.6/faction-guides/mystics/Gauntlet_v0.6_Mystics_Faction_Guide.md']:
              p=Path(path); text=p.read_text(encoding='utf-8').replace('Catalysis','Materia Prima').replace('The Circle Holds','Guardians of the Circle')
              assert '<<<<<<<' not in text and '=======' not in text and '>>>>>>>' not in text,path
              p.write_text(text,encoding='utf-8')
          Path('REBASE_CONFLICTS.txt').unlink(missing_ok=True)
          Path('BLOCK_COUNTS.txt').unlink(missing_ok=True)
          PY
      - name: Commit resolution
        run: |
          rm .github/workflows/resolve-mystics-rollups.yml
          git config user.name 'Gauntlet Documentation Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Resolve Mystics rollups against current main'
          git push origin HEAD:agent/mystics-rebase-test
