name: Audit v0.6.0 release directory rename

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    if: github.head_ref == 'agent/rename-release-directory-v0.6.0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Verify renamed release tree
        run: |
          set -euo pipefail

          test -d releases/v0.6.0
          test ! -e releases/v0.6
          test "$(git ls-files 'releases/v0.6.0/**' | wc -l)" -gt 0
          test -z "$(git ls-files 'releases/v0.6/**')"

          if git grep -nP 'releases/v0\.6(?!\.0)' -- ':!.github/workflows/rename-release-directory.yml'; then
            echo 'Found a remaining reference to the old release directory.' >&2
            exit 1
          fi

          node scripts/build-v0.6.0-release.mjs
          git diff --exit-code
