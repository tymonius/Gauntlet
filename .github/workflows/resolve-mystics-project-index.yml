name: Resolve Mystics Project Index conflict

on:
  push:
    branches:
      - agent/mystics-rebase-test
    paths:
      - .github/workflows/resolve-mystics-project-index.yml

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mystics-rebase-test
      - name: Resolve Project Index
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p=Path('docs/Gauntlet_v0.6_Project_Index.md')
          text=p.read_text(encoding='utf-8')
          ms=list(re.finditer(r'<<<<<<< ours\n(.*?)=======\n(.*?)>>>>>>> theirs\n?',text,re.S))
          assert len(ms)==7, len(ms)

          def hierarchy(o,t):
              s=o
              def bump(m):
                  n=int(m.group(1)); return f'{n+1}. ' if n>=7 else m.group(0)
              s=re.sub(r'(?m)^(\d+)\. ',bump,s)
              marker='6. **`../releases/v0.6/faction-guides/inquisition/Gauntlet_v0.6_Inquisition_Faction_Guide.md`**'
              line='7. **`../releases/v0.6/faction-guides/mystics/Gauntlet_v0.6_Mystics_Faction_Guide.md`** — definitive Mystics faction source: rules, Alchemist, Spirit Walker, Rites, Ritual, Invocation, Transmutation, supplemental components, strategy, terminology, and the canonical twelve-card pool. The adjacent PDF and DOCX are release-formatted editions.\n'
              i=s.index(marker); e=s.index('\n',i)+1; s=s[:e]+line+s[e:]
              s=s.replace('112 current playable designs','122 current playable designs')
              s=s.replace('Active v0.6 documents govern until the remaining Mystics card package, copied-effect rules, and package testing are resolved. For Military, Diplomats, Inquisition, Financiers, and Intelligence, the definitive faction guides above override earlier development records and split package documents, which have been removed from the active repository.','All six definitive faction guides override earlier development records and split package documents. Remaining work concerns shared copied-effect validation, focused package testing, physical production, and canonical data.')
              s=s.replace('the split Financier pool and design notes, and the split Intelligence exact-text pool','the split Financier pool and design notes, the split Intelligence exact-text pool, and earlier Mystics drafts')
              return s

          resolutions=[
              hierarchy,
              lambda o,t:'- Military, Diplomats, Inquisition, Mystics, Financiers, and Intelligence are complete at **12** cards each and have definitive release guides.\n- Militias and Patriotism are retired.\n- The project contains **122 current playable designs**: 50 Neutral and 12 for each of the six factions.',
              lambda o,t:'- Validate impossible-target and source-dependent copied-effect handling generally, including Treason.\n- Playtest and physically review the Mystics, Financier, and Intelligence definitive guides.\n- Complete the dedicated Mystics and Financier printable packages.',
              lambda o,t:'- The Working Rules and preliminary core rulebook include independent Action and hand-commitment limits, voluntary Asset removal, no Conditions, Asset/Overlay persistence, negation, bounded copied-effect handling, revised Diplomat rules, current Inquisition and Financier rules, and stable Mystics bound-card, repeated-effect, and Overlay clarifications.\n- `../releases/v0.6/Gauntlet_v0.6_Preliminary_Core_Rules.md` is the self-contained player-facing shared-rules draft and contains integration summaries for Military, Diplomats, Inquisition, Mystics, and Financiers.',
              lambda o,t:'- The v0.6 development deckbuilder is live under `../deckbuilder-v0.6/` and reads the active Neutral, Military, Diplomat, Inquisition, Financier, Intelligence, and Territory Markdown sources at runtime.\n- It supports implemented faction and leader selection, Neutral-plus-faction legality, playable-card count/value validation, all 25 Territories, local saves, JSON/text export, random valid test-deck generation, and browser print output.\n- Military, Diplomats, Inquisition, Financiers, and Intelligence include their implemented supplemental components in print output.\n- Mystics source and component specifications are complete, but deckbuilder and faction-sheet integration remain pending.',
              lambda o,t:'- Military, Diplomat, Inquisition, and Intelligence printable packages are under `faction-sheets/`; dedicated Mystics and Financier sheets remain production work.\n- Definitive guide packages for all six factions are under `releases/v0.6/faction-guides/` in Markdown, DOCX, and PDF formats.',
              lambda o,t:'Playtest and physically review the definitive Mystics, Financier, and Intelligence guides. Complete Mystics deckbuilder and faction-sheet integration plus the Financier printable package, then create canonical v0.6 data only after shared copied-effect and physical-review blockers are resolved.'
          ]
          out=[]; pos=0
          for m,r in zip(ms,resolutions):
              out.append(text[pos:m.start()]); out.append(r(m.group(1),m.group(2)).rstrip()+'\n'); pos=m.end()
          out.append(text[pos:]); text=''.join(out)
          text=text.replace('Catalysis','Materia Prima').replace('The Circle Holds','Guardians of the Circle')
          text=re.sub(r'\n### Financier checkpoint\n\n- Curve: \*\*1 / 3 / 4 / 3 / 1\*\*\.\n- Total value: 36; average: 3\.00\.\n- Roster: \*\*Speculation; Monetary Crisis; Liquidation; Underwriting; Capital Gains; Tariffs; Divestment; Margin Loan; Leveraged Buyout; Foreclosure; Property Dues; Corner the Market\*\*\.\n- \*\*Corner the Market\*\* is the Unique cost-5 statement card\.\n- Exact text is in `Gauntlet_v0\.6_Financier_Card_Pool\.md`; rationale and audit are in `Gauntlet_v0\.6_Financier_Design_Notes\.md`\.\n- Definitive-guide, component, and release-format consolidation remain\.\n','\n',text,count=1)
          assert '<<<<<<<' not in text and '=======' not in text and '>>>>>>>' not in text
          p.write_text(text,encoding='utf-8')
          PY
      - name: Commit resolution
        run: |
          rm .github/workflows/resolve-mystics-project-index.yml
          git config user.name 'Gauntlet Documentation Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add docs/Gauntlet_v0.6_Project_Index.md .github/workflows/resolve-mystics-project-index.yml
          git commit -m 'Resolve Mystics Project Index against current main'
          git push origin HEAD:agent/mystics-rebase-test
