name: Dedupe Financier apply integration
on:
  push:
    branches: [feature/financier-investment-actions]
permissions:
  contents: write
jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[apply-deduped]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/financier-investment-actions
          fetch-depth: 0
      - name: Remove duplicate helper
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/state/apply.ts')
          text = path.read_text()
          block = """function skipTariffsDraw(game: GameState, playerId: PlayerID): ApplyGameActionResult {
            if (game.activePlayer !== playerId || game.phase !== 'turn_start') throw new GameActionError('Tariffs can replace only your normal turn-start draw.');
            const next = structuredClone(game);
            next.phase = 'action_before_movement';
            next.log.push({ id: `${next.id}-event-${next.log.length + 1}`, turn: next.turn, actor: playerId, type: 'financier_tariffs_draw_skipped', message: `${next.players[playerId].name} skipped their normal draw because Tariffs is banked.`, visibility: 'public' });
            runPostActionAutomationPipeline(next);
            return { state: next };
          }

          """
          if text.count(block) != 2:
            raise SystemExit(f'Expected two helper blocks, found {text.count(block)}')
          path.write_text(text.replace(block + block, block, 1))
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/state/apply.ts
          git commit -m "Remove duplicate Tariffs helper [apply-deduped]"
          git push origin HEAD:feature/financier-investment-actions
