name: Consolidate Diplomat Influence tracker

on:
  push:
    branches:
      - agent/consolidate-diplomat-influence-tracker

permissions:
  contents: write

jobs:
  consolidate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/consolidate-diplomat-influence-tracker
          fetch-depth: 0

      - name: Apply consolidated Influence rules and production references
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one match in {path}, found {count}: {old[:100]!r}")
              p.write_text(text.replace(old, new, 1))

          # Central rules.
          replace_once(
              "docs/Gauntlet_v0.6_Working_Rules.md",
              "**Resource:** Influence. Influence starts at 1, cannot fall below 0, and currently has no maximum.",
              "**Resource:** Influence. Influence starts at 1, has a maximum of 10, and cannot fall below 0. Any Influence gained beyond 10 is lost.",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Working_Rules.md",
              "Each Proposal lists an **Influence Stake**. To offer that Proposal, place the listed amount of available Influence on its Proposal or Treaty Article card. Staked Influence is unavailable until the Terms resolve and cannot be spent through Leverage or another effect. A zero-stake Proposal requires no Influence.",
              "Each Proposal lists an **Influence Stake**. To offer that Proposal, the Diplomat must have at least that much available Influence. Reduce their available Influence by the listed amount; that amount becomes staked until the Terms resolve. Staked Influence cannot be spent through Leverage or another effect. A zero-stake Proposal requires no Influence.\n\nAvailable Influence is displayed by sliding the selected Leader Card over the 0–10 Influence Tracker. Lower the tracker when Influence is staked or spent; raise it when Influence is returned, recovered, or gained. No separate Influence or stake marker is used.",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Working_Rules.md",
              "The authoritative Leader Cards, Proposal / Treaty Article cards, Terms reference, and Influence-token specification are maintained in `Gauntlet_v0.6_Diplomat_Supplemental_Cards.md`.",
              "The authoritative Leader Cards, Proposal / Treaty Article cards, Terms reference, and sliding Influence Tracker specification are maintained in `Gauntlet_v0.6_Diplomat_Supplemental_Cards.md`.",
          )

          # Diplomat rationale and component model.
          replace_once(
              "docs/Gauntlet_v0.6_Diplomat_Design_Notes.md",
              "Diplomats begin with **1 Influence**. This gives immediate access to the cost-1 Proposal tier or one point of Leverage without making the two strongest Proposals immediately available.",
              "Diplomats begin with **1 Influence** and may have up to **10 Influence**. Any Influence gained beyond 10 is lost. The starting point gives immediate access to the stake-1 Proposal tier or one point of Leverage without making the two strongest Proposals immediately available.",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Diplomat_Design_Notes.md",
              "To offer a Proposal, the Diplomat must place its listed stake on that Proposal card. Staked Influence is removed from the Diplomat's available Influence until the Terms resolve and cannot be spent through Leverage or another effect.",
              "To offer a Proposal, the Diplomat must have at least its listed stake available. Lower the Influence Tracker by that amount; it becomes staked until the Terms resolve and cannot be spent through Leverage or another effect. The Proposal's printed stake records the amount at risk, so no separate stake marker is needed.",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Diplomat_Design_Notes.md",
              "- it has no fixed per-battle cap.",
              "- it has no fixed per-battle cap beyond the amount of available Influence, which can never exceed 10.",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Diplomat_Design_Notes.md",
              "Uncapped spending creates an intentional late-game possibility: a Diplomat may cash out several turns of political capital to impose a critical Article, especially the fifth. That should feel like a climactic commitment, not ordinary generic combat superiority.",
              "Allowing the Diplomat to spend all available Influence creates an intentional late-game possibility: several turns of political capital may be cashed out to impose a critical Article, especially the fifth. The 10-Influence maximum provides a hard ceiling, while the current Proposal stake usually lowers the amount available for Leverage. This should feel like a climactic commitment, not ordinary generic combat superiority.",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Diplomat_Design_Notes.md",
              "- Influence tokens.",
              "- one shared 0–10 sliding Influence Tracker placed beneath the selected Leader Card.",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Diplomat_Design_Notes.md",
              "Influence stakes are placed directly on the offered Proposal card. This makes political risk visible and clearly separates available Influence from staked Influence.",
              "Available Influence is shown by sliding the selected Leader Card over the Influence Tracker. To stake Influence, lower the tracker by the Proposal's printed stake; that printed value records the amount currently at risk. This keeps available Influence distinct from staked Influence without adding a token or marker.",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Diplomat_Design_Notes.md",
              "- Does uncapped Leverage produce memorable commitments rather than deterministic non-decisions?\n- What are the average, upper-quartile, and maximum Influence totals held and spent in one battle?",
              "- Does allowing all available Influence to be spent through Leverage produce memorable commitments rather than deterministic non-decisions?\n- What are the average, upper-quartile, and maximum Influence totals held and spent in one battle?\n- Is the 10-Influence maximum reached often enough to waste meaningful gains or cap healthy progression?\n- Does the sliding tracker remain stable and make available versus staked Influence easy to understand?",
          )

          # Open decisions and test questions.
          replace_once(
              "docs/Gauntlet_v0.6_Open_Questions.md",
              "- Diplomats begin with 1 Influence.\n- Proposals use listed Influence Stakes rather than ordinary costs.",
              "- Diplomats begin with 1 Influence and may have up to 10; excess gains are lost.\n- Proposals use listed Influence Stakes rather than ordinary costs.",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Open_Questions.md",
              "- The supplemental set uses two Leader Cards, nine double-sided Proposal / Treaty Article cards, one double-sided Diplomat Reference, and Influence tokens.",
              "- The supplemental set uses two Leader Cards, one shared 0–10 sliding Influence Tracker, nine double-sided Proposal / Treaty Article cards, and one double-sided Diplomat Reference.\n- The printable Diplomat package uses four 9-up sheets, with mirrored Treaty Article backs for long-edge duplex printing.",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Open_Questions.md",
              "- Does uncapped Leverage produce memorable commitments rather than deterministic battles?",
              "- Does allowing all available Influence to be spent through Leverage—up to 10, less any current stake—produce memorable commitments rather than deterministic battles?",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Open_Questions.md",
              "- Does the Diplomat's uncapped Leverage preserve a meaningful direct-combat weakness outside refused Terms?",
              "- Does the Diplomat's ability to spend all available Influence through Leverage preserve a meaningful direct-combat weakness outside refused Terms?",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Open_Questions.md",
              "- What are the average, upper-quartile, and maximum Influence totals held and spent in one battle?",
              "- What are the average, upper-quartile, and maximum Influence totals held and spent in one battle?\n- How often is the 10-Influence maximum reached, and how much Influence is lost to the cap?\n- Is the sliding Influence Tracker stable and clear at values 8–10 and while a stake is outstanding?",
          )

          # Project map and milestone checkpoint.
          replace_once(
              "docs/Gauntlet_v0.6_Project_Index.md",
              "34. **`Gauntlet_v0.6_Diplomat_Supplemental_Cards.md`** — authoritative Ambassador, Senator, Proposal / Treaty Article, Terms reference, and Influence component specification.",
              "34. **`Gauntlet_v0.6_Diplomat_Supplemental_Cards.md`** — authoritative Ambassador, Senator, Proposal / Treaty Article, Terms reference, and 0–10 sliding Influence Tracker specification.",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Project_Index.md",
              "- Diplomats begin with 1 Influence and use the 3 / 4 / 2 Proposal-stake structure at stakes 0 / 1 / 2.\n- The Ambassador, Senator, Proposal / Treaty Article cards, reference, and Influence supply are specified in `Gauntlet_v0.6_Diplomat_Supplemental_Cards.md`.",
              "- Diplomats begin with 1 Influence, may have up to 10, and use the 3 / 4 / 2 Proposal-stake structure at stakes 0 / 1 / 2.\n- The Ambassador, Senator, Proposal / Treaty Article cards, reference, and 0–10 sliding Influence Tracker are specified in `Gauntlet_v0.6_Diplomat_Supplemental_Cards.md`.\n- `../faction-sheets/diplomat.html` provides the current four-sheet printable Diplomat package, including duplex Proposal / Treaty Article faces.",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Project_Index.md",
              "- the revised Diplomat starting Influence, Proposal stakes, accepted-ratification rewards, Leverage, Treaty Article, and Senator rules;",
              "- the revised Diplomat starting Influence, 10-Influence maximum, slider-based staking, accepted-ratification rewards, Leverage, Treaty Article, and Senator rules;",
          )
          replace_once(
              "docs/Gauntlet_v0.6_Project_Index.md",
              "- The Military printable faction sheet is available under `faction-sheets/` and uses the existing General and Commandant image assets.\n- The Inquisition supplemental set is Grand Inquisitor or Witch Hunter, two single-sided rules references, and one 0–4 Conviction tracker with a marker.",
              "- The Military printable faction sheet is available under `faction-sheets/` and uses the existing General and Commandant image assets.\n- The Diplomat supplemental set is Ambassador or Senator, one shared 0–10 sliding Influence Tracker, nine double-sided Proposal / Treaty Article cards, and one double-sided reference card.\n- The Diplomat printable faction sheet is available under `faction-sheets/` and includes mirrored Treaty Article backs for long-edge duplex printing.\n- The Inquisition supplemental set is Grand Inquisitor or Witch Hunter, two single-sided rules references, and one 0–4 Conviction tracker with a marker.",
          )

          # Playtest telemetry and usability questions.
          replace_once(
              "docs/Gauntlet_Playtest_Targets_and_Metrics.md",
              "- Influence available before each offer, staked, returned, lost, recovered by Political Capital, and remaining after resolution;",
              "- Influence available before each offer, staked, returned, lost, recovered by Political Capital, and remaining after resolution;\n- maximum Influence held, number of times the 10-Influence cap was reached, and Influence lost because of the cap;",
          )
          replace_once(
              "docs/Gauntlet_Playtest_Targets_and_Metrics.md",
              "- Did the Diplomat face meaningful choices between saving Influence for future Proposals and spending it in the current battle?\n- Did the Senator's card sacrifice feel appropriately costly for the Influence preserved?",
              "- Did the Diplomat face meaningful choices between saving Influence for future Proposals and spending it in the current battle?\n- Was the 10-Influence maximum noticeable, restrictive, or effectively irrelevant?\n- Did the sliding tracker remain stable and make available versus staked Influence clear?\n- Did the Senator's card sacrifice feel appropriately costly for the Influence preserved?",
          )
          replace_once(
              "docs/Gauntlet_Playtest_Targets_and_Metrics.md",
              "5. Test the revised Diplomat economy Proposal by Proposal, including stake-tier acceptance, accepted-ratification Influence, imposition rewards, failed stakes, Senator recovery, Leverage spending, and repeated offers.",
              "5. Test the revised Diplomat economy Proposal by Proposal, including stake-tier acceptance, accepted-ratification Influence, imposition rewards, failed stakes, Senator recovery, Leverage spending, the 10-Influence cap, tracker usability, and repeated offers.",
          )

          # Repository landing pages.
          replace_once(
              "README.md",
              "- `docs/Gauntlet_v0.6_Diplomat_Card_Pool.md` — authoritative working Diplomat exact text;\n- `docs/Gauntlet_v0.6_Inquisition_Card_Pool.md` — authoritative working Inquisition exact text;",
              "- `docs/Gauntlet_v0.6_Diplomat_Card_Pool.md` — authoritative working Diplomat exact text;\n- `docs/Gauntlet_v0.6_Diplomat_Supplemental_Cards.md` — Ambassador, Senator, Proposal / Treaty Article cards, reference, and sliding Influence Tracker;\n- `docs/Gauntlet_v0.6_Inquisition_Card_Pool.md` — authoritative working Inquisition exact text;",
          )
          replace_once(
              "README.md",
              "Browser-printable working sheets for v0.6 faction cards and supplemental components. Military and Inquisition currently have complete two-sheet print-and-play packages; see `faction-sheets/README.md` for rendered links and instructions.",
              "Browser-printable working sheets for v0.6 faction cards and supplemental components. Military and Inquisition have complete two-sheet packages; Diplomats have a four-sheet package with duplex Proposal / Treaty Article faces. See `faction-sheets/README.md` for rendered links and instructions.",
          )
          replace_once(
              "faction-sheets/index.html",
              "  <div class=\"sheet-link\">\n    <a href=\"military.html\">Military faction sheets</a>\n    <div class=\"status\">Twelve playable cards, General, Commandant, and sliding Command tracker.</div>\n  </div>",
              "  <div class=\"sheet-link\">\n    <a href=\"military.html\">Military faction sheets</a>\n    <div class=\"status\">Twelve playable cards, General, Commandant, and sliding Command tracker.</div>\n  </div>\n  <div class=\"sheet-link\">\n    <a href=\"diplomat.html\">Diplomat faction sheets</a>\n    <div class=\"status\">Twelve playable cards, Ambassador, Senator, nine Proposal / Treaty Article pairs, two reference faces, and a 0–10 sliding Influence Tracker.</div>\n  </div>\n  <div class=\"sheet-link\">\n    <a href=\"inquisition.html\">Inquisition faction sheets</a>\n    <div class=\"status\">Twelve playable cards, Grand Inquisitor, Witch Hunter, two rules references, and a 0–4 Conviction tracker.</div>\n  </div>",
          )

          # Ensure the temporary workflow is not part of the final branch diff.
          Path(".github/workflows/consolidate-diplomat-influence.yml").unlink()

          # Targeted stale-wording guard across active sources.
          checks = {
              "docs/Gauntlet_v0.6_Working_Rules.md": [
                  "Influence starts at 1, cannot fall below 0, and currently has no maximum",
                  "place the listed amount of available Influence on its Proposal",
                  "Influence-token specification",
              ],
              "docs/Gauntlet_v0.6_Diplomat_Design_Notes.md": [
                  "- Influence tokens.",
                  "Influence stakes are placed directly on the offered Proposal card",
                  "Does uncapped Leverage",
              ],
              "docs/Gauntlet_v0.6_Open_Questions.md": [
                  "and Influence tokens.",
                  "Does uncapped Leverage",
                  "Diplomat's uncapped Leverage",
              ],
          }
          for path, needles in checks.items():
              text = Path(path).read_text()
              for needle in needles:
                  if needle in text:
                      raise SystemExit(f"Stale wording remains in {path}: {needle}")
          PY

      - name: Commit consolidated sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/Gauntlet_v0.6_Working_Rules.md docs/Gauntlet_v0.6_Diplomat_Design_Notes.md docs/Gauntlet_v0.6_Open_Questions.md docs/Gauntlet_v0.6_Project_Index.md docs/Gauntlet_Playtest_Targets_and_Metrics.md faction-sheets/index.html .github/workflows/consolidate-diplomat-influence.yml
          git commit -m "Consolidate Diplomat Influence tracker rules"
          git push origin HEAD:agent/consolidate-diplomat-influence-tracker
