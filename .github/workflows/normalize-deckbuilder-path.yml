name: Normalize deckbuilder paths

on:
  push:
    branches: [fix/deckbuilder-links-and-qr]
    paths:
      - .github/workflows/normalize-deckbuilder-path.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: fix/deckbuilder-links-and-qr

      - name: Install document and QR tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc poppler-utils fonts-noto-core fonts-noto-extra librsvg2-bin
          python3 -m pip install --upgrade pip
          python3 -m pip install python-docx weasyprint Pillow pypdf qrcode

      - name: Rename deckbuilder directories and update references
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import subprocess

          workflow = Path('.github/workflows/normalize-deckbuilder-path.yml')
          placeholder = '__GAUNTLET_CURRENT_DECKBUILDER__'
          tracked = subprocess.check_output(['git', 'ls-files', '-z']).decode().split('\0')

          for raw in tracked:
              if not raw:
                  continue
              path = Path(raw)
              if path == workflow or not path.is_file():
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except (UnicodeDecodeError, OSError):
                  continue

              updated = text.replace('deckbuilder-v0.6', placeholder)
              updated = updated.replace('deckbuilder/', 'deckbuilder-v0.5/')
              updated = updated.replace(placeholder, 'deckbuilder')
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
          PY

          test -d deckbuilder
          test -d deckbuilder-v0.6
          test ! -e deckbuilder-v0.5
          git mv deckbuilder deckbuilder-v0.5
          git mv deckbuilder-v0.6 deckbuilder

          mkdir -p deckbuilder-v0.6
          cat > deckbuilder-v0.6/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0; url=../deckbuilder/">
            <link rel="canonical" href="https://gauntlet.run/deckbuilder/">
            <title>Gauntlet Deckbuilder moved</title>
            <script>
              const destination = new URL('../deckbuilder/', window.location.href);
              destination.search = window.location.search;
              destination.hash = window.location.hash;
              window.location.replace(destination.href);
            </script>
          </head>
          <body>
            <p>The current Gauntlet Deckbuilder has moved to <a href="../deckbuilder/">gauntlet.run/deckbuilder/</a>.</p>
          </body>
          </html>
          HTML

      - name: Generate canonical deckbuilder QR
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          import qrcode
          import qrcode.image.svg

          url = 'https://gauntlet.run/deckbuilder/'
          target = Path('images/qr/gauntlet-v0.6-deckbuilder.svg')
          image = qrcode.make(
              url,
              image_factory=qrcode.image.svg.SvgPathImage,
              box_size=10,
              border=4,
              error_correction=qrcode.constants.ERROR_CORRECT_M,
          )
          image.save(target)

          ET.register_namespace('', 'http://www.w3.org/2000/svg')
          tree = ET.parse(target)
          root = tree.getroot()
          root.set('role', 'img')
          root.set('aria-labelledby', 'title desc')
          root.set('width', '37mm')
          root.set('height', '37mm')
          title = ET.Element('{http://www.w3.org/2000/svg}title', {'id': 'title'})
          title.text = 'Gauntlet v0.6 Deckbuilder QR code'
          desc = ET.Element('{http://www.w3.org/2000/svg}desc', {'id': 'desc'})
          desc.text = f'Scan to open {url}'
          root.insert(0, desc)
          root.insert(0, title)
          tree.write(target, encoding='UTF-8', xml_declaration=True)
          PY

      - name: Validate path migration
        run: |
          test -s deckbuilder/index.html
          test -s deckbuilder-v0.5/index.html
          test -s deckbuilder-v0.6/index.html
          grep -q '<h1>v0.6 Deckbuilder</h1>' deckbuilder/index.html
          grep -q '<h1>v0.5 Deckbuilder</h1>' deckbuilder-v0.5/index.html
          grep -q 'https://gauntlet.run/deckbuilder/' README.md
          grep -q 'https://gauntlet.run/deckbuilder/' scripts/prepare-v0.6-markdown.py
          grep -q 'Scan to open https://gauntlet.run/deckbuilder/' images/qr/gauntlet-v0.6-deckbuilder.svg
          ! grep -RIl --exclude='index.html' 'gauntlet.run/deckbuilder-v0.6/' .

      - name: Render and validate documents
        run: bash scripts/render-v0.6.0-documents.sh

      - name: Run repository tests
        run: npm test

      - name: Commit migration and remove this workflow
        run: |
          rm .github/workflows/normalize-deckbuilder-path.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Make the current deckbuilder the canonical URL"
          git push origin HEAD:fix/deckbuilder-links-and-qr
