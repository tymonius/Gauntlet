name: Diagnose Mystics rebase conflicts

on:
  push:
    branches:
      - agent/mystics-rebase-test
    paths:
      - .github/workflows/resolve-mystics-rebase.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mystics-rebase-test
      - name: Count conflict blocks
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          paths=[
            'README.md',
            'docs/Gauntlet_v0.6_Card_Metadata.md',
            'docs/Gauntlet_v0.6_Open_Questions.md',
            'docs/Gauntlet_v0.6_Project_Index.md',
            'docs/card-reviews/STATUS.md',
            'releases/v0.6/Gauntlet_v0.6_Preliminary_Core_Rules.md',
          ]
          lines=[]
          for path in paths:
            text=Path(path).read_text(encoding='utf-8')
            count=len(re.findall(r'<<<<<<< ours\n(.*?)=======\n(.*?)>>>>>>> theirs\n?',text,re.S))
            lines.append(f'{path}: {count}')
          Path('BLOCK_COUNTS.txt').write_text('\n'.join(lines)+'\n',encoding='utf-8')
          PY
      - name: Commit diagnostics
        run: |
          rm .github/workflows/resolve-mystics-rebase.yml
          git config user.name 'Gauntlet Documentation Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add BLOCK_COUNTS.txt .github/workflows/resolve-mystics-rebase.yml
          git commit -m 'Record Mystics rebase conflict counts'
          git push origin HEAD:agent/mystics-rebase-test
