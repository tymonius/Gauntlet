name: Materialize definitive Inquisition guide

on:
  push:
    branches:
      - main
    paths:
      - ".tmp/build-inquisition-guide.py.gz.b64"
      - ".tmp/consolidate-inquisition-source.py.part-*"
      - ".github/workflows/materialize-inquisition-guide.yml"

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install document dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-docx pillow
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer fonts-liberation poppler-utils

      - name: Consolidate definitive source hierarchy
        run: |
          cat .tmp/consolidate-inquisition-source.py.part-* > /tmp/consolidate-inquisition-source.py
          python /tmp/consolidate-inquisition-source.py

      - name: Materialize guide builder
        run: |
          base64 --decode .tmp/build-inquisition-guide.py.gz.b64 > /tmp/build-inquisition-guide.py.gz
          gzip --decompress --stdout /tmp/build-inquisition-guide.py.gz > /tmp/build-inquisition-guide.py

      - name: Build DOCX
        run: |
          python /tmp/build-inquisition-guide.py \
            --repo-root . \
            --output-dir releases/v0.6/faction-guides/inquisition

      - name: Build PDF
        run: |
          libreoffice --headless \
            --convert-to pdf \
            --outdir releases/v0.6/faction-guides/inquisition \
            releases/v0.6/faction-guides/inquisition/Gauntlet_v0.6_Inquisition_Faction_Guide.docx

      - name: Remove superseded Inquisition documents
        run: |
          rm -f docs/Gauntlet_v0.6_Inquisition_Card_Pool.md
          rm -f docs/Gauntlet_v0.6_Inquisition_Design_Notes.md
          rm -f docs/Gauntlet_v0.6_Inquisition_Supplemental_Cards.md

      - name: Validate definitive package
        run: |
          test -s releases/v0.6/faction-guides/inquisition/Gauntlet_v0.6_Inquisition_Faction_Guide.md
          test -s releases/v0.6/faction-guides/inquisition/Gauntlet_v0.6_Inquisition_Faction_Guide.docx
          test -s releases/v0.6/faction-guides/inquisition/Gauntlet_v0.6_Inquisition_Faction_Guide.pdf
          test "$(pdfinfo releases/v0.6/faction-guides/inquisition/Gauntlet_v0.6_Inquisition_Faction_Guide.pdf | awk '/^Pages:/ {print $2}')" = "8"
          test ! -e docs/Gauntlet_v0.6_Inquisition_Card_Pool.md
          test ! -e docs/Gauntlet_v0.6_Inquisition_Design_Notes.md
          test ! -e docs/Gauntlet_v0.6_Inquisition_Faction_Guide.md
          test ! -e docs/Gauntlet_v0.6_Inquisition_Supplemental_Cards.md
          ! grep -RInE 'Gauntlet_v0\.6_Inquisition_(Card_Pool|Design_Notes|Supplemental_Cards)\.md|docs/Gauntlet_v0\.6_Inquisition_Faction_Guide\.md' \
            README.md docs/Gauntlet_v0.6_*.md docs/card-reviews/STATUS.md faction-sheets deckbuilder-v0.6 data src releases/v0.6
          grep -q 'If you do and the opponent loses' releases/v0.6/faction-guides/inquisition/Gauntlet_v0.6_Inquisition_Faction_Guide.md
          grep -q 'If you do, end their turn' releases/v0.6/faction-guides/inquisition/Gauntlet_v0.6_Inquisition_Faction_Guide.md
          node --check deckbuilder-v0.6/app.js

      - name: Commit definitive package and clean temporary files
        run: |
          rm -f .tmp/build-inquisition-guide.py.gz.b64
          rm -f .tmp/consolidate-inquisition-source.py.part-*
          rm -f .github/workflows/materialize-inquisition-guide.yml
          rmdir .tmp 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize definitive Inquisition faction guide package"
          git push
