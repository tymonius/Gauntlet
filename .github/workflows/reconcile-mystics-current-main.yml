name: Reconcile Mystics with current main

on:
  push:
    branches:
      - agent/finalize-mystics-faction-guide
    paths:
      - .github/workflows/reconcile-mystics-current-main.yml

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finalize-mystics-faction-guide
          fetch-depth: 0

      - name: Merge current main and resolve rollups
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          set +e
          git merge --no-ff --no-commit origin/main
          merge_status=$?
          set -e

          conflicts="$(git diff --name-only --diff-filter=U | sort)"
          expected="$(printf '%s\n' README.md docs/Gauntlet_v0.6_Project_Index.md docs/card-reviews/STATUS.md | sort)"
          if [[ "$conflicts" != "$expected" ]]; then
            echo "Unexpected conflicts:"
            printf '%s\n' "$conflicts"
            exit 1
          fi

          git checkout --ours -- README.md docs/Gauntlet_v0.6_Project_Index.md docs/card-reviews/STATUS.md

          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Missing expected text in {path}: {old!r}")
              p.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace(
              "README.md",
              "Browser-printable working sheets for v0.6 faction cards and supplemental components. Military, Inquisition, and Intelligence have complete two-sheet packages; Diplomats have a four-sheet package with duplex Proposal / Treaty Article faces. See `faction-sheets/README.md` for rendered links and instructions.",
              "Browser-printable working sheets for v0.6 faction cards and supplemental components. Military, Inquisition, Financiers, and Intelligence have complete two-sheet packages; Diplomats have a four-sheet package with duplex Proposal / Treaty Article faces. See `faction-sheets/README.md` for rendered links and instructions.",
          )
          replace(
              "README.md",
              "The Military, Diplomat, Inquisition, and Intelligence sheets are derived production files governed by their definitive faction guides. Dedicated Financier and Mystics browser-printable sheets remain production tasks.",
              "The Military, Diplomat, Inquisition, Financier, and Intelligence sheets are derived production files governed by their definitive faction guides. A dedicated Mystics browser-printable sheet remains a production task.",
          )

          replace(
              "docs/Gauntlet_v0.6_Project_Index.md",
              "- The supplemental specification uses either leader, one Financier Reference, and a public Capital / Deed ledger or equivalent record.\n- `../releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.md` is the definitive Financier source; the adjacent DOCX and PDF are release-formatted editions using the Banker and Executive sketches under `../images/sketches/`.",
              "- The supplemental set uses either leader, one Financier Reference, and a public Capital / Deed Ledger rather than currency tokens.\n- `../faction-sheets/financier.html` is the two-sheet printable package using dedicated Banker and Executive leader-card crops under `../images/leader-cards/`.\n- `../releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.md` is the definitive Financier source; the adjacent DOCX and PDF are release-formatted editions using the Banker and Executive sketches under `../images/sketches/`.",
          )
          replace(
              "docs/Gauntlet_v0.6_Project_Index.md",
              "- Complete the dedicated Mystics and Financier printable packages.",
              "- Complete the dedicated Mystics printable package.",
          )
          replace(
              "docs/Gauntlet_v0.6_Project_Index.md",
              "- Military, Diplomat, Inquisition, and Intelligence printable packages are under `faction-sheets/`; dedicated Mystics and Financier sheets remain production work.",
              "- Military, Diplomat, Inquisition, Financier, and Intelligence printable packages are under `faction-sheets/`; the dedicated Mystics sheet remains production work.",
          )
          replace(
              "docs/Gauntlet_v0.6_Project_Index.md",
              "Playtest and physically review the definitive Mystics, Financier, and Intelligence guides. Complete Mystics deckbuilder and faction-sheet integration plus the Financier printable package, then create canonical v0.6 data only after shared copied-effect and physical-review blockers are resolved.",
              "Playtest and physically review the definitive Mystics, Financier, and Intelligence guides and existing printable packages. Complete Mystics deckbuilder and faction-sheet integration, then create canonical v0.6 data only after shared copied-effect and physical-review blockers are resolved.",
          )

          replace(
              "docs/card-reviews/STATUS.md",
              "**Financier pool:** Complete at 12 cards; definitive faction guide packaged  ",
              "**Financier pool:** Complete at 12 cards; definitive faction guide and printable package complete  ",
          )
          replace(
              "docs/card-reviews/STATUS.md",
              "- The definitive source is `releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.md`, with matching release DOCX and PDF.",
              "- The definitive source is `releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.md`, with matching release DOCX and PDF.\n- `faction-sheets/financier.html` is the two-sheet printable package using Banker, Executive, the Financier Reference, the public Capital / Deed Ledger, and dedicated leader-card crops.",
          )
          replace(
              "docs/card-reviews/STATUS.md",
              "- Complete dedicated Mystics and Financier printable sheets and Mystics deckbuilder integration.",
              "- Complete the dedicated Mystics printable sheet and Mystics deckbuilder integration.",
          )
          replace(
              "docs/card-reviews/STATUS.md",
              "Playtest the definitive Mystics, Financier, and Intelligence guides alongside the established factions. Complete the remaining Mystics and Financier production integration, and reopen a definitive roster only when testing reveals a strategic, balance, wording, or production failure.",
              "Playtest the definitive Mystics, Financier, and Intelligence guides alongside the established factions. Complete the remaining Mystics production integration, and reopen a definitive roster only when testing reveals a strategic, balance, wording, or production failure.",
          )
          PY

          git add README.md docs/Gauntlet_v0.6_Project_Index.md docs/card-reviews/STATUS.md
          git rm .github/workflows/reconcile-mystics-current-main.yml
          git commit -m "Merge current main into Mystics package branch"
          git push origin HEAD:agent/finalize-mystics-faction-guide
