name: Patch Financier acquisition integration
on:
  push:
    branches: [feature/financier-acquisition-actions]
permissions:
  contents: write
jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[acquisition-apply-patched]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/financier-acquisition-actions
          fetch-depth: 0
      - name: Patch apply integration
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/state/apply.ts')
          text = path.read_text()

          import_anchor = "import { applyFinancierActionEffect, reconcileFinancierCardState, requireTariffsMayLeavePlay, resolveFinancierCardChoice, resolveFinancierCardTurnStart, shouldSkipNormalDrawForTariffs } from './financier-cards';"
          import_line = "import { applyFinancierAcquisitionActionEffect, resolveFinancierAcquisitionChoice } from './financier-acquisition-cards';"
          if import_line not in text:
            if import_anchor not in text:
              raise SystemExit('Financier card import anchor not found')
            text = text.replace(import_anchor, import_anchor + '\n' + import_line, 1)

          old_resolve = "if (action.type === 'resolve_financier_choice') { const next = structuredClone(game); if (!resolveFinancierCardChoice(next, action)) resolveFinancierChoice(next, action); reconcileFinancierCardState(next); enforceDiplomatAssetLimits(next); runPostActionAutomationPipeline(next); return { state: next }; }"
          new_resolve = "if (action.type === 'resolve_financier_choice') { const next = structuredClone(game); if (!resolveFinancierAcquisitionChoice(next, action) && !resolveFinancierCardChoice(next, action)) resolveFinancierChoice(next, action); reconcileFinancierCardState(next); enforceDiplomatAssetLimits(next); runPostActionAutomationPipeline(next); return { state: next }; }"
          if old_resolve not in text:
            raise SystemExit('Financier choice routing target not found')
          text = text.replace(old_resolve, new_resolve, 1)

          old_effect = "applyMilitaryActionEffect(result.state, action.playerId, action.cardId, action.targets); applyFinancierActionEffect(result.state, action.playerId, action.cardId, action.targets); openCensureChoiceAfterAction(result.state, action.playerId);"
          new_effect = "applyMilitaryActionEffect(result.state, action.playerId, action.cardId, action.targets); applyFinancierActionEffect(result.state, action.playerId, action.cardId, action.targets); applyFinancierAcquisitionActionEffect(result.state, action.playerId, action.cardId, action.targets); openCensureChoiceAfterAction(result.state, action.playerId);"
          if old_effect not in text:
            raise SystemExit('Financier Action effect target not found')
          text = text.replace(old_effect, new_effect, 1)

          path.write_text(text)
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/state/apply.ts
          git commit -m "Integrate Financier acquisition Action cards [acquisition-apply-patched]"
          git push origin HEAD:feature/financier-acquisition-actions
