name: Apply Diplomat text pass on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tighten-diplomat-card-text
          fetch-depth: 0

      - name: Run asserted transformation from branch workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          workflow = Path('.github/workflows/tighten-diplomat-card-text.yml').read_text()
          marker = "python3 - <<'PY'\n"
          if marker not in workflow:
              raise SystemExit('Transformation script marker not found')
          script = workflow.split(marker, 1)[1].split('\n          PY', 1)[0]
          exec(compile(textwrap.dedent(script), 'tighten-diplomat-card-text', 'exec'))
          PY
          rm -f .github/workflows/pr-trigger-tighten-diplomat.yml

      - name: Validate printable source
        run: node --check faction-sheets/diplomat.js

      - name: Commit exact-text pass
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Tighten Diplomat card and reference text"
          git push origin HEAD:agent/tighten-diplomat-card-text
