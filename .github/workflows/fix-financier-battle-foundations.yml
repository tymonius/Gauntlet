name: Fix Financier battle foundations
on:
  push:
    branches: [feature/financier-battle-foundations]
permissions:
  contents: write
jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[financier-battle-fixed]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/financier-battle-foundations
          fetch-depth: 0
      - name: Patch fixtures and cleanup
        shell: python
        run: |
          from pathlib import Path

          test_path = Path('src/state/financier-battle-cards.test.ts')
          tests = test_path.read_text()
          tests = tests.replace(
              "const setup = game([], ['financiers-underwriting'], 1, 6);",
              "const setup = game([], ['financiers-underwriting'], 6, 1);",
              1,
          )
          tests = tests.replace(
              "setup.state.players.player_2.resources = { capital: { value: 0, maximum: 99 } };",
              "setup.state.players.player_2.resources = { capital: { key: 'capital', label: 'Capital', value: 0, minimum: 0, limitKind: 'dynamic' } };",
              1,
          )
          commit_anchor = "setup.state.battle!.stage = 'hand_commit';\n    expect(() => applyGameAction(setup.state, { type: 'commit_battle_hand_card', playerId: 'player_1', cardId: 'financiers-monetary-crisis' })).not.toThrow();"
          commit_replacement = "setup.state.battle!.stage = 'hand_commit';\n    setup.state.battle!.attacker.passedHandCommit = false;\n    setup.state.battle!.attacker.handCommit = undefined;\n    expect(() => applyGameAction(setup.state, { type: 'commit_battle_hand_card', playerId: 'player_1', cardId: 'financiers-monetary-crisis' })).not.toThrow();"
          if commit_anchor not in tests:
              raise SystemExit('Playability fixture anchor not found')
          tests = tests.replace(commit_anchor, commit_replacement, 1)
          test_path.write_text(tests)

          apply_path = Path('src/state/apply.ts')
          text = apply_path.read_text()
          text = text.replace(
              "result.state.pendingFinancierChoice = undefined; result.state.financierChoiceQueue = undefined; result.state.pendingLeaderAbilityWindow = undefined; result.state.financierChoiceQueue = undefined;",
              "result.state.pendingFinancierChoice = undefined; result.state.financierChoiceQueue = undefined; result.state.pendingLeaderAbilityWindow = undefined;",
              1,
          )
          cleanup_anchor = "result.state.pendingMilitaryTimingChoice = undefined; result.state.militaryTimingChoiceQueue = undefined; result.state.pendingLeaderAbilityWindow = undefined;"
          cleanup_replacement = "result.state.pendingMilitaryTimingChoice = undefined; result.state.militaryTimingChoiceQueue = undefined; result.state.pendingFinancierChoice = undefined; result.state.financierChoiceQueue = undefined; result.state.pendingLeaderAbilityWindow = undefined;"
          if cleanup_anchor not in text:
              raise SystemExit('End-turn cleanup anchor not found')
          text = text.replace(cleanup_anchor, cleanup_replacement, 1)
          apply_path.write_text(text)
      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/state/financier-battle-cards.test.ts src/state/apply.ts
          git commit -m "Fix Financier battle fixtures and cleanup [financier-battle-fixed]"
          git push origin HEAD:feature/financier-battle-foundations
