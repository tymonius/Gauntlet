name: Finalize Exfiltration tests

on:
  push:
    branches:
      - feature/intelligence-exfiltration-battle

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/intelligence-exfiltration-battle
          fetch-depth: 0

      - name: Fix endpoint fixture and restore workflow
        shell: python
        run: |
          from pathlib import Path

          test = Path('src/state/intelligence-exfiltration-battle.test.ts')
          text = test.read_text()
          text = text.replace(
              """    const origin = state.board.spaces.find((space) => space.index === 6)!;
                  const location = state.board.spaces.find((space) => space.index === 7)!;
              """,
              """    const origin = state.board.spaces.find((space) => space.index === 7)!;
                  const location = state.board.spaces.find((space) => space.index === 8)!;
              """,
          )
          text = text.replace(
              "expect(state.players.player_2.occupiedSpaceId).toBe('space-7');",
              "expect(state.players.player_2.occupiedSpaceId).toBe('player_2-before-gauntlet');",
          )
          test.write_text(text)

          Path('.github/workflows/test.yml').write_text("""name: Test

          on:
            pull_request:
            push:
              branches:
                - main

          jobs:
            test:
              runs-on: ubuntu-latest

              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22

                - name: Install dependencies
                  run: npm install

                - name: Typecheck
                  run: npm run typecheck

                - name: Test
                  run: npm test
          """.replace('          ', ''))

          Path('.github/workflows/finalize-exfiltration-tests.yml').unlink()

      - name: Commit cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/state/intelligence-exfiltration-battle.test.ts .github/workflows/test.yml .github/workflows/finalize-exfiltration-tests.yml
          git commit -m "Fix Exfiltration endpoint fixture"
          git push origin HEAD:feature/intelligence-exfiltration-battle
