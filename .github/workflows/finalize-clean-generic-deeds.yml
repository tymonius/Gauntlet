name: Finalize clean generic Financier Deeds

on:
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/generic-deed-cards-clean'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/generic-deed-cards-clean
          fetch-depth: 0
      - name: Copy finalized Financier package from staging branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin agent/add-generic-deed-cards
          git checkout origin/agent/add-generic-deed-cards -- \
            deckbuilder-v0.6/README.md \
            deckbuilder-v0.6/faction-components.js \
            deckbuilder-v0.6/index.html \
            deckbuilder-v0.6/print.js \
            deckbuilder-v0.6/supplemental-data.js \
            docs/Gauntlet_v0.6_Open_Questions.md \
            docs/Gauntlet_v0.6_Project_Index.md \
            docs/Gauntlet_v0.6_Working_Rules.md \
            docs/card-reviews/STATUS.md \
            faction-sheets/README.md \
            faction-sheets/financier.css \
            faction-sheets/financier.html \
            faction-sheets/financier.js \
            releases/v0.6/Gauntlet_v0.6_Preliminary_Core_Rules.md \
            releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.docx \
            releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.md \
            releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.pdf
          rm .github/workflows/finalize-clean-generic-deeds.yml
          git add -A
          git commit -m "Replace Financier ledger with generic Deed cards"
          git push origin HEAD:agent/generic-deed-cards-clean
