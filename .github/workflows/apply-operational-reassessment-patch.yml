name: Apply Operational Reassessment integration patch

on:
  push:
    branches:
      - feature/intelligence-operational-reassessment-battle

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/intelligence-operational-reassessment-battle
          fetch-depth: 0

      - name: Patch integration files
        shell: python
        run: |
          from pathlib import Path

          types = Path('src/types/intelligence.ts')
          text = types.read_text()
          marker = "  | {\n      kind: 'mission_control';\n"
          variant = """  | {
              kind: 'operational_reassessment_battle';
              playerId: PlayerID;
              battleId: string;
              eligibleCardIds: CardID[];
              options: ['pass', 'select'];
              resumePriorityPlayer?: PlayerID;
            }
          """
          if "kind: 'operational_reassessment_battle'" not in text:
              text = text.replace(marker, variant + marker)
          types.write_text(text)

          options = Path('src/dev/intelligence-battle-options.ts')
          text = options.read_text()
          marker = "  if (pending.kind === 'mission_control') {\n"
          branch = """  if (pending.kind === 'operational_reassessment_battle') {
            return [
              action('Keep Operational Reassessment in the battle', 'pass'),
              ...pending.eligibleCardIds.map((cardId) => action(`Replace Operational Reassessment with ${cardId}`, 'select', cardId)),
            ];
          }
          """
          if "pending.kind === 'operational_reassessment_battle'" not in text:
              text = text.replace(marker, branch + marker)
          options.write_text(text)

          index = Path('src/state/index.ts')
          text = index.read_text()
          if "export * from './intelligence-operational-reassessment-battle';" not in text:
              text = text.replace(
                  "export * from './intelligence-spies-battle';\n",
                  "export * from './intelligence-spies-battle';\nexport * from './intelligence-operational-reassessment-battle';\n",
              )
          text = text.replace(
              "export { applyGameAction } from './apply-spies';",
              "export { applyGameAction } from './apply-operational-reassessment';",
          )
          index.write_text(text)

          Path('.github/workflows/apply-operational-reassessment-patch.yml').unlink()

      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/types/intelligence.ts src/dev/intelligence-battle-options.ts src/state/index.ts .github/workflows/apply-operational-reassessment-patch.yml
          git commit -m "Integrate Operational Reassessment Battle window"
          git push origin HEAD:feature/intelligence-operational-reassessment-battle
