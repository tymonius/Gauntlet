name: Build v0.6.0 canonical release data

# Pull requests run the canonical parser before release publication.
on:
  push:
    branches: [main]
    paths:
      - scripts/build-v0.6.0-release.mjs
      - docs/Gauntlet_v0.6_Neutral_Card_Pool.md
      - docs/Gauntlet_v0.6_Territory_Pool.md
      - releases/v0.6/Gauntlet_v0.6.0_Rulebook.md
      - releases/v0.6/faction-guides/**
      - images/sketches/**
      - .github/workflows/build-v0.6.0-release.yml
  pull_request:
    branches: [main]
    paths:
      - scripts/build-v0.6.0-release.mjs
      - docs/Gauntlet_v0.6_Neutral_Card_Pool.md
      - docs/Gauntlet_v0.6_Territory_Pool.md
      - releases/v0.6/Gauntlet_v0.6.0_Rulebook.md
      - releases/v0.6/faction-guides/**
      - images/sketches/**
      - .github/workflows/build-v0.6.0-release.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate and validate canonical outputs
        run: node scripts/build-v0.6.0-release.mjs

      - name: Commit generated outputs
        run: |
          if git diff --quiet -- releases/v0.6/Gauntlet_v0.6.0_Canonical_Data.json releases/v0.6/Gauntlet_v0.6.0_Reference_Guide.md releases/v0.6/Gauntlet_v0.6.0_Manifest.json; then
            echo "Canonical outputs are current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases/v0.6/Gauntlet_v0.6.0_Canonical_Data.json releases/v0.6/Gauntlet_v0.6.0_Reference_Guide.md releases/v0.6/Gauntlet_v0.6.0_Manifest.json
          git commit -m "Generate v0.6.0 canonical release data [skip ci]"
          git push origin HEAD

      - uses: actions/upload-artifact@v4
        with:
          name: gauntlet-v0.6.0-canonical-data
          path: |
            releases/v0.6/Gauntlet_v0.6.0_Canonical_Data.json
            releases/v0.6/Gauntlet_v0.6.0_Reference_Guide.md
            releases/v0.6/Gauntlet_v0.6.0_Manifest.json
