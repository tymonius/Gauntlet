name: Validate playtest packet

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    if: github.head_ref == 'agent/add-playtest-questionnaire'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install project dependencies
        run: npm install

      - name: Run repository checks
        run: |
          npm run typecheck
          npm test

      - name: Install browser and PDF tools
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
          python3 -m pip install pypdf pymupdf pillow

      - name: Serve repository
        run: |
          python3 -m http.server 8000 > /tmp/gauntlet-http.log 2>&1 &
          echo $! > /tmp/gauntlet-http.pid

      - name: Validate browser form and print layout
        run: |
          mkdir -p playtest-validation
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import { chromium } from 'playwright';

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({
            viewport: { width: 1440, height: 1100 },
            acceptDownloads: true
          });
          const errors = [];
          page.on('pageerror', error => errors.push(error.message));
          page.on('console', message => {
            if (message.type() === 'error') errors.push(message.text());
          });
          page.on('dialog', dialog => dialog.accept());

          await page.goto('http://127.0.0.1:8000/playtest/', { waitUntil: 'networkidle' });
          await page.waitForSelector('#ratingMatrixA .rating-table');
          await page.waitForSelector('#issueRows tr:nth-child(5)');

          const structure = await page.evaluate(() => ({
            pages: document.querySelectorAll('.print-page').length,
            ratingRowsA: document.querySelectorAll('#ratingMatrixA tbody tr').length,
            ratingRowsB: document.querySelectorAll('#ratingMatrixB tbody tr').length,
            issueRows: document.querySelectorAll('#issueRows tr').length,
            namedFields: [...document.querySelectorAll('#playtestForm [name]')].length
          }));
          console.log(structure);
          if (structure.pages !== 7) throw new Error(`Expected 7 print pages, found ${structure.pages}.`);
          if (structure.ratingRowsA !== 16 || structure.ratingRowsB !== 16) throw new Error('Expected 16 rating rows for each player.');
          if (structure.issueRows !== 5) throw new Error(`Expected 5 issue rows, found ${structure.issueRows}.`);
          if (structure.namedFields < 200) throw new Error(`Expected a comprehensive form; found only ${structure.namedFields} named fields.`);

          await page.fill('[name=session_id]', 'validation-session');
          await page.fill('[name=a_name]', 'Tester A');
          await page.fill('[name=b_name]', 'Tester B');
          await page.fill('[name=a_faction]', 'Military');
          await page.fill('[name=b_faction]', 'Diplomats');
          await page.check('[name=a_rating_overall_fun][value="5"]');
          await page.fill('[name=single_conclusion]', 'The packet captured the intended session evidence.');
          await page.waitForFunction(() => document.querySelector('#saveStatus').textContent.includes('saved'));

          await page.reload({ waitUntil: 'networkidle' });
          await page.waitForSelector('#ratingMatrixA .rating-table');
          const restored = await page.evaluate(() => ({
            session: document.querySelector('[name=session_id]').value,
            playerA: document.querySelector('[name=a_name]').value,
            rating: document.querySelector('[name=a_rating_overall_fun]:checked')?.value,
            conclusion: document.querySelector('[name=single_conclusion]').value
          }));
          console.log({ restored });
          if (restored.session !== 'validation-session' || restored.playerA !== 'Tester A' || restored.rating !== '5') {
            throw new Error('Local draft did not restore correctly.');
          }

          const downloadPromise = page.waitForEvent('download');
          await page.click('#downloadButton');
          const download = await downloadPromise;
          await download.saveAs('playtest-validation/response.json');
          const response = JSON.parse(fs.readFileSync('playtest-validation/response.json', 'utf8'));
          if (response.schema !== 'gauntlet-playtest-response' || response.schemaVersion !== 1 || response.session_id !== 'validation-session') {
            throw new Error('Downloaded response JSON has incorrect schema or values.');
          }

          await page.screenshot({ path: 'playtest-validation/screen.png', fullPage: true });
          await page.emulateMedia({ media: 'print' });
          const pageBoxes = await page.evaluate(() => [...document.querySelectorAll('.print-page')].map((element, index) => {
            const pageRect = element.getBoundingClientRect();
            const footer = element.querySelector('.page-footer');
            const contentLimit = footer ? footer.getBoundingClientRect().top - 3 : pageRect.bottom - 12;
            const contentNodes = [...element.querySelectorAll('*')].filter(node => !node.closest('.page-footer'));
            const contentBottom = Math.max(pageRect.top, ...contentNodes.map(node => node.getBoundingClientRect().bottom));
            return {
              page: index + 1,
              pageHeight: pageRect.height,
              contentBottom,
              contentLimit,
              overflow: contentBottom - contentLimit
            };
          }));
          console.log({ pageBoxes });
          const overflowing = pageBoxes.filter(item => item.overflow > 1);
          if (overflowing.length) throw new Error(`Print-page content crosses the footer boundary: ${JSON.stringify(overflowing)}`);

          await page.pdf({
            path: 'playtest-validation/Gauntlet_v0.6.0_Playtest_Packet.pdf',
            format: 'Letter',
            printBackground: true,
            preferCSSPageSize: true,
            margin: { top: '0', right: '0', bottom: '0', left: '0' }
          });

          await browser.close();
          if (errors.length) throw new Error(`Browser errors:\n${errors.join('\n')}`);
          NODE

      - name: Validate and render the PDF
        run: |
          python3 <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          import fitz
          from PIL import Image, ImageDraw

          root = Path('playtest-validation')
          pdf_path = root / 'Gauntlet_v0.6.0_Playtest_Packet.pdf'
          reader = PdfReader(str(pdf_path))
          if len(reader.pages) != 7:
              raise SystemExit(f'Expected 7 PDF pages, found {len(reader.pages)}')

          for index, page in enumerate(reader.pages, 1):
              width = float(page.mediabox.width)
              height = float(page.mediabox.height)
              if abs(width - 612) > 2 or abs(height - 792) > 2:
                  raise SystemExit(f'Page {index} is not Letter size: {width} x {height}')
              text = page.extract_text() or ''
              if len(text.strip()) < 150:
                  raise SystemExit(f'Page {index} appears suspiciously sparse ({len(text.strip())} characters)')

          document = fitz.open(pdf_path)
          thumbs = []
          for index, page in enumerate(document):
              pix = page.get_pixmap(matrix=fitz.Matrix(1.15, 1.15), alpha=False)
              image = Image.frombytes('RGB', (pix.width, pix.height), pix.samples)
              image.thumbnail((420, 544))
              canvas = Image.new('RGB', (440, 580), 'white')
              canvas.paste(image, ((440 - image.width) // 2, 20))
              draw = ImageDraw.Draw(canvas)
              draw.text((10, 555), f'Page {index + 1}', fill='black')
              thumbs.append(canvas)

          columns = 2
          rows = (len(thumbs) + columns - 1) // columns
          sheet = Image.new('RGB', (columns * 440, rows * 580), '#d9d9d9')
          for index, image in enumerate(thumbs):
              sheet.paste(image, ((index % columns) * 440, (index // columns) * 580))
          sheet.save(root / 'contact-sheet.png')
          print('Validated seven Letter pages and created contact sheet.')
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: playtest-packet-validation
          path: playtest-validation/
