name: Validate Diplomat framing

on:
  pull_request:
    paths:
      - "faction-sheets/diplomat*"
      - "images/leader-cards/**"
      - ".github/workflows/validate-diplomat-framing.yml"

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install chromium --with-deps

      - name: Render Diplomat faction sheet
        run: |
          cat > /tmp/render-diplomat.mjs <<'EOF'
          import { chromium } from 'playwright';
          import { spawn } from 'node:child_process';

          const server = spawn('python3', ['-m', 'http.server', '8000'], {
            stdio: 'inherit'
          });

          await new Promise((resolve) => setTimeout(resolve, 1500));

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({
            viewport: { width: 1600, height: 1200 },
            deviceScaleFactor: 1
          });

          await page.goto(
            'http://127.0.0.1:8000/faction-sheets/diplomat.html',
            { waitUntil: 'networkidle' }
          );

          await page.screenshot({
            path: 'diplomat-faction-sheet.png',
            fullPage: true
          });

          const leaderCards = page.locator('.leader-card');
          await leaderCards.screenshot({ path: 'diplomat-leader-cards.png' });

          const framing = await page.locator('.leader-card').evaluateAll((cards) =>
            cards.map((card) => {
              const image = card.querySelector('.leader-art img');
              const art = card.querySelector('.leader-art');
              const style = getComputedStyle(image);
              return {
                leader: card.dataset.cardName,
                naturalSize: `${image.naturalWidth}x${image.naturalHeight}`,
                artSize: `${art.getBoundingClientRect().width.toFixed(2)}x${art.getBoundingClientRect().height.toFixed(2)}`,
                imageSize: `${image.getBoundingClientRect().width.toFixed(2)}x${image.getBoundingClientRect().height.toFixed(2)}`,
                objectFit: style.objectFit,
                objectPosition: style.objectPosition,
                transform: style.transform,
                transformOrigin: style.transformOrigin
              };
            })
          );

          console.log(JSON.stringify(framing, null, 2));

          await browser.close();
          server.kill();
          EOF

          node /tmp/render-diplomat.mjs | tee diplomat-framing-metrics.json

      - uses: actions/upload-artifact@v4
        with:
          name: diplomat-framing-proof
          path: |
            diplomat-faction-sheet.png
            diplomat-leader-cards.png
            diplomat-framing-metrics.json
