name: Replace Banker sketch

on:
  push:
    branches:
      - fix/replace-banker-sketch-materialize
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  replace:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[materialized]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/replace-banker-sketch-materialize
          fetch-depth: 0
      - name: Replace image
        run: |
          cat .tmp/banker-image.part-* | base64 --decode > images/sketches/banker.png
          echo "7bf20864004ab9f5153e29151b1fdb810c665d1c929bf6268d50c70fd3a7cd17  images/sketches/banker.png" | sha256sum --check
      - name: Commit replacement
        run: |
          rm -f .tmp/banker-image.part-* .github/workflows/materialize-banker-sketch.yml
          rmdir .tmp 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace Banker sketch [materialized]"
          git push
