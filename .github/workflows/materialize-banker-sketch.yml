name: Replace Banker sketch

on:
  push:
    branches:
      - fix/replace-banker-sketch-materialize

permissions:
  contents: write

jobs:
  replace:
    if: ${{ !contains(github.event.head_commit.message, '[materialized]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/replace-banker-sketch-materialize
          fetch-depth: 0
      - name: Replace image
        run: cat .tmp/banker-image.part-* | base64 --decode > images/sketches/banker.png
      - name: Commit replacement
        run: |
          rm -f .tmp/banker-image.part-* .tmp/trigger .github/workflows/materialize-banker-sketch.yml
          rmdir .tmp 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace Banker sketch [materialized]"
          git push
