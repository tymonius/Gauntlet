name: Apply Spies wrapper patch

on:
  push:
    branches:
      - feature/intelligence-spies-battle

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/intelligence-spies-battle
          fetch-depth: 0

      - name: Patch integration files
        shell: python
        run: |
          from pathlib import Path

          index = Path('src/state/index.ts')
          text = index.read_text()
          if "export * from './intelligence-spies-battle';" not in text:
              text = text.replace(
                  "export * from './intelligence-simple-battle-effects';\n",
                  "export * from './intelligence-simple-battle-effects';\nexport * from './intelligence-spies-battle';\n",
              )
          text = text.replace(
              "export { applyGameAction } from './apply-intelligence';",
              "export { applyGameAction } from './apply-spies';",
          )
          index.write_text(text)

          options = Path('src/dev/intelligence-battle-options.ts')
          text = options.read_text()
          marker = "  if (pending.kind === 'mission_control') {\n"
          spies = """  if (pending.kind === 'spies_battle_reselect') {
            return [
              action('Keep the current Battle Hand selection', 'pass'),
              ...pending.eligibleCardIds.map((cardId) => action(`Replace the selected card with ${cardId}`, 'select', cardId)),
            ];
          }
          """
          if "pending.kind === 'spies_battle_reselect'" not in text:
              text = text.replace(marker, spies + marker)
          options.write_text(text)

          Path('.github/workflows/apply-spies-wrapper-patch.yml').unlink()

      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/state/index.ts src/dev/intelligence-battle-options.ts .github/workflows/apply-spies-wrapper-patch.yml
          git commit -m "Integrate Spies pre-reveal wrapper"
          git push origin HEAD:feature/intelligence-spies-battle
