name: Validate recommended starter Decks in browser

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  browser:
    if: github.head_ref == 'agent/add-recommended-starter-decks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install browser test tools
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Serve repository
        run: |
          python3 -m http.server 8000 > /tmp/gauntlet-http.log 2>&1 &
          echo $! > /tmp/gauntlet-http.pid

      - name: Load and validate all twelve presets
        run: |
          node --input-type=module <<'NODE'
          import { chromium } from 'playwright';

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1440, height: 1100 } });
          const runtimeErrors = [];

          page.on('pageerror', error => runtimeErrors.push(error.message));
          page.on('console', message => {
            if (message.type() === 'error') runtimeErrors.push(message.text());
          });
          page.on('dialog', dialog => dialog.accept());

          await page.goto('http://127.0.0.1:8000/deckbuilder/', { waitUntil: 'networkidle' });
          await page.waitForSelector('#app:not([hidden])');
          await page.waitForFunction(() => !document.querySelector('#starterDeckButton').disabled);

          const pairs = await page.evaluate(() => {
            return FACTIONS.filter(faction => faction.status === 'ready').flatMap(faction =>
              faction.leaders.map(leader => ({ factionId: faction.id, leaderId: leader.id, leaderName: leader.name }))
            );
          });

          if (pairs.length !== 12) throw new Error(`Expected 12 faction/Leader pairs, found ${pairs.length}.`);

          for (const pair of pairs) {
            await page.selectOption('#factionSelect', pair.factionId);
            await page.selectOption('#leaderSelect', pair.leaderId);
            await page.waitForFunction(
              ({ factionId, leaderId }) =>
                state.factionId === factionId &&
                state.leaderId === leaderId &&
                !document.querySelector('#starterDeckButton').disabled,
              pair
            );
            await page.click('#starterDeckButton');
            await page.waitForFunction(() =>
              document.querySelector('#cardCount').textContent === '30' &&
              document.querySelector('#pointTotal').textContent === '60' &&
              document.querySelector('#territoryMetricCount').textContent === '3' &&
              document.querySelector('#validityText').textContent === 'Valid' &&
              !document.querySelector('#printDeckButton').disabled
            );

            const result = await page.evaluate(() => ({
              name: document.querySelector('#deckName').value,
              cards: document.querySelector('#cardCount').textContent,
              value: document.querySelector('#pointTotal').textContent,
              territories: document.querySelector('#territoryMetricCount').textContent,
              status: document.querySelector('#validityText').textContent,
              preview: document.querySelector('#starterDeckPreview h3')?.textContent || ''
            }));
            console.log(`✓ ${pair.leaderName}: ${result.name} — ${result.cards} cards, ${result.value} value, ${result.territories} Territories, ${result.status}`);
            if (!result.preview) throw new Error(`${pair.leaderName} has no starter Deck preview.`);
          }

          await page.screenshot({ path: 'starter-deckbuilder.png', fullPage: true });
          await browser.close();

          if (runtimeErrors.length) {
            throw new Error(`Browser runtime errors:\n${runtimeErrors.join('\n')}`);
          }
          NODE

      - uses: actions/upload-artifact@v4
        with:
          name: recommended-starter-deckbuilder-check
          path: starter-deckbuilder.png
