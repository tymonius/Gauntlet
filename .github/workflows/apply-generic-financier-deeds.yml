name: Apply generic Financier Deed cards

on:
  push:
    branches:
      - agent/add-generic-deed-cards

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-generic-deed-cards
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install document tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-docx pypdf
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer

      - name: Materialize one-time finalizer
        shell: bash
        run: |
          python - <<'PY'
          import base64, gzip
          from pathlib import Path
          payload = """"""
          Path('.github/scripts/finalize_generic_deeds.py').write_bytes(gzip.decompress(base64.b64decode(payload)))
          PY

      - name: Apply Deed-card component model
        run: python .github/scripts/finalize_generic_deeds.py

      - name: Remove one-time finalizer
        run: |
          rm .github/scripts/finalize_generic_deeds.py
          rm .github/workflows/apply-generic-financier-deeds.yml

      - name: Commit finalized package
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace Financier ledger with generic Deed cards"
          git push origin HEAD:agent/add-generic-deed-cards
