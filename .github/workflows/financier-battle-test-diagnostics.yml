name: Financier battle test diagnostics
on:
  pull_request:
    branches: [main]
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Capture focused tests
        run: npm test -- src/state/financier-battle-cards.test.ts > financier-battle-test-errors.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: financier-battle-test-errors
          path: financier-battle-test-errors.txt
