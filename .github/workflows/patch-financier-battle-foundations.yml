name: Patch Financier battle foundations
on:
  push:
    branches: [feature/financier-battle-foundations]
permissions:
  contents: write
jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[financier-battle-patched]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/financier-battle-foundations
          fetch-depth: 0
      - name: Patch state integration and guided options
        shell: python
        run: |
          from pathlib import Path

          apply_path = Path('src/state/apply.ts')
          text = apply_path.read_text()

          anchor = "import { applyFinancierAcquisitionActionEffect, resolveFinancierAcquisitionChoice } from './financier-acquisition-cards';"
          addition = "import { buildFinancierBattleAftermath, isFinancierBattleChoice, openNextFinancierChoice, resolveFinancierBattleChoice } from './financier-battle-cards';"
          if addition not in text:
            if anchor not in text:
              raise SystemExit('Financier acquisition import anchor not found')
            text = text.replace(anchor, anchor + '\n' + addition, 1)

          old_aftermath = "recordHostileTakeoverEligibility(result.state, battle, winner); clearFinancierBattleState(result.state); buildMilitaryAftermathChoices(result.state, battle); openPostBattleOrderWindow(result.state, winner);"
          new_aftermath = "recordHostileTakeoverEligibility(result.state, battle, winner); buildMilitaryAftermathChoices(result.state, battle); buildFinancierBattleAftermath(result.state, battle, winner); clearFinancierBattleState(result.state); openPostBattleOrderWindow(result.state, winner);"
          if old_aftermath not in text:
            raise SystemExit('Battle aftermath anchor not found')
          text = text.replace(old_aftermath, new_aftermath, 1)

          old_financier = "if (action.type === 'resolve_financier_choice') { const next = structuredClone(game); if (!resolveFinancierAcquisitionChoice(next, action) && !resolveFinancierCardChoice(next, action)) resolveFinancierChoice(next, action); reconcileFinancierCardState(next); enforceDiplomatAssetLimits(next); runPostActionAutomationPipeline(next); return { state: next }; }"
          new_financier = "if (action.type === 'resolve_financier_choice') { const next = structuredClone(game); const wasBattleChoice = isFinancierBattleChoice(next.pendingFinancierChoice); if (!resolveFinancierBattleChoice(next, action) && !resolveFinancierAcquisitionChoice(next, action) && !resolveFinancierCardChoice(next, action)) resolveFinancierChoice(next, action); reconcileFinancierCardState(next); enforceDiplomatAssetLimits(next); if (wasBattleChoice && !next.pendingFinancierChoice && !next.pendingMilitaryChoice && next.recentBattleResult) openPostBattleOrderWindow(next, next.recentBattleResult.winner); runPostActionAutomationPipeline(next); return { state: next }; }"
          if old_financier not in text:
            raise SystemExit('Financier choice routing anchor not found')
          text = text.replace(old_financier, new_financier, 1)

          old_military = "if (action.type === 'resolve_military_choice') { const next = structuredClone(game); resolveMilitaryChoice(next, action.playerId, action.choice, action.cardId); if (!next.pendingMilitaryChoice && next.recentBattleResult) openPostBattleOrderWindow(next, next.recentBattleResult.winner); runPostActionAutomationPipeline(next); return { state: next }; }"
          new_military = "if (action.type === 'resolve_military_choice') { const next = structuredClone(game); resolveMilitaryChoice(next, action.playerId, action.choice, action.cardId); if (!next.pendingMilitaryChoice) openNextFinancierChoice(next); if (!next.pendingMilitaryChoice && !next.pendingFinancierChoice && next.recentBattleResult) openPostBattleOrderWindow(next, next.recentBattleResult.winner); runPostActionAutomationPipeline(next); return { state: next }; }"
          if old_military not in text:
            raise SystemExit('Military choice continuation anchor not found')
          text = text.replace(old_military, new_military, 1)

          text = text.replace("reconcileFinancierCardState(result.state); reconcileFinancierCardState(result.state);", "reconcileFinancierCardState(result.state);", 1)
          text = text.replace("result.state.pendingLeaderAbilityWindow = undefined;", "result.state.pendingLeaderAbilityWindow = undefined; result.state.financierChoiceQueue = undefined;", 1)
          text = text.replace("result.state.pendingFinancierChoice = undefined; result.state.pendingLeaderAbilityWindow", "result.state.pendingFinancierChoice = undefined; result.state.financierChoiceQueue = undefined; result.state.pendingLeaderAbilityWindow", 1)
          apply_path.write_text(text)

          guided_path = Path('src/dev/guided-options.ts')
          guided = guided_path.read_text()
          guided_anchor = "case 'margin_loan_repayment': return [option(`Repay Margin Loan for ${pending.repaymentCost} Capital`, 'repay'), option(`Default and lose ${pending.collateralCardId}`, 'default')];"
          guided_addition = "case 'battle_capital_gains': return pending.eligibleCardIds.map((cardId) => option(`Place ${cardId} in Treasury with Capital Gains`, cardId, cardId));\n    case 'battle_monetary_crisis': return pending.handOptions.map((cardId) => option(`Keep ${cardId}; discard the rest`, cardId, cardId));"
          if guided_addition not in guided:
            if guided_anchor not in guided:
              raise SystemExit('Guided Financier choice anchor not found')
            guided = guided.replace(guided_anchor, guided_anchor + '\n    ' + guided_addition, 1)
          guided_path.write_text(guided)

      - name: Commit integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/state/apply.ts src/dev/guided-options.ts
          git commit -m "Integrate Financier battle aftermath choices [financier-battle-patched]"
          git push origin HEAD:feature/financier-battle-foundations
