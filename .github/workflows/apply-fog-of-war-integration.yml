name: Apply Fog of War integration

on:
  push:
    branches:
      - feature/intelligence-fog-of-war-battle

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/intelligence-fog-of-war-battle
          fetch-depth: 0

      - name: Patch shared integration files
        shell: python
        run: |
          from pathlib import Path

          battle = Path('src/state/intelligence-battle.ts')
          text = battle.read_text()
          text = text.replace(
              "import { battleHasUnresolvedSpies, openNextSpiesBattleWindow } from './intelligence-spies-battle';",
              "import { battleHasUnresolvedFogOfWar, openNextFogOfWarBattleWindow } from './intelligence-fog-of-war-battle';\nimport { battleHasUnresolvedSpies, openNextSpiesBattleWindow } from './intelligence-spies-battle';",
          )
          text = text.replace(
              "  if (openNextSpiesBattleWindow(game)) return;\n  revealDeferredBattleCards(game);",
              "  if (openNextFogOfWarBattleWindow(game)) return;\n  if (openNextSpiesBattleWindow(game)) return;\n  revealDeferredBattleCards(game);",
          )
          text = text.replace(
              "  return battleHasUnresolvedSpies(game, incomingCardId);",
              "  return battleHasUnresolvedFogOfWar(game, incomingCardId)\n    || battleHasUnresolvedSpies(game, incomingCardId);",
          )
          battle.write_text(text)

          options = Path('src/dev/intelligence-battle-options.ts')
          text = options.read_text()
          marker = "  if (pending.kind === 'operational_reassessment_battle') {\n"
          branch = """  if (pending.kind === 'fog_of_war_return') {
            return [
              action(`Return hand commitment ${pending.handCardId}`, 'return_hand'),
              ...pending.battleHandCardIds.map((cardId) => action(`Return selected Battle Hand card ${cardId}`, 'return_battle_hand', cardId)),
            ];
          }
          """
          if "pending.kind === 'fog_of_war_return'" not in text:
              text = text.replace(marker, branch + marker)
          options.write_text(text)

          index = Path('src/state/index.ts')
          text = index.read_text()
          if "export * from './intelligence-fog-of-war-battle';" not in text:
              text = text.replace(
                  "export * from './intelligence-spies-battle';\n",
                  "export * from './intelligence-spies-battle';\nexport * from './intelligence-fog-of-war-battle';\n",
              )
          text = text.replace(
              "export { applyGameAction } from './apply-operational-reassessment';",
              "export { applyGameAction } from './apply-fog-of-war';",
          )
          index.write_text(text)

          Path('.github/workflows/apply-fog-of-war-integration.yml').unlink()

      - name: Commit integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/state/intelligence-battle.ts src/dev/intelligence-battle-options.ts src/state/index.ts .github/workflows/apply-fog-of-war-integration.yml
          git commit -m "Integrate Fog of War pre-reveal timing"
          git push origin HEAD:feature/intelligence-fog-of-war-battle
