name: Finalize Financier faction package

on:
  push:
    branches:
      - agent/finalize-financier-faction-guide
    paths:
      - .github/workflows/finalize-financier-package.yml

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/finalize-financier-faction-guide
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install document dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mistune python-docx pillow
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils

      - name: Synchronize repository documents
        run: python scripts/finalize_financier_package.py

      - name: Build release DOCX and PDF
        run: |
          python scripts/build_financier_faction_guide.py
          GUIDE_DIR='releases/v0.6/faction-guides/financier'
          libreoffice --headless --convert-to pdf --outdir "$GUIDE_DIR" "$GUIDE_DIR/Gauntlet_v0.6_Financier_Faction_Guide.docx"

      - name: Validate generated package
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import zipfile

          root = Path('.')
          guide_dir = root / 'releases/v0.6/faction-guides/financier'
          md = guide_dir / 'Gauntlet_v0.6_Financier_Faction_Guide.md'
          docx = guide_dir / 'Gauntlet_v0.6_Financier_Faction_Guide.docx'
          pdf = guide_dir / 'Gauntlet_v0.6_Financier_Faction_Guide.pdf'
          for path in (md, docx, pdf):
              if not path.exists() or path.stat().st_size == 0:
                  raise SystemExit(f'Missing or empty generated file: {path}')
          with zipfile.ZipFile(docx) as archive:
              if 'word/document.xml' not in archive.namelist():
                  raise SystemExit('Generated DOCX is invalid')
          text = md.read_text(encoding='utf-8')
          section = text.split('## 6. Canonical Financier card pool', 1)[1].split('## 7. Card-pool summary', 1)[0]
          names = re.findall(r'^###\s+(.+)$', section, flags=re.M)
          if len(names) != 12:
              raise SystemExit(f'Expected 12 canonical cards, found {len(names)}: {names}')
          required = {
              'Speculation', 'Monetary Crisis', 'Liquidation', 'Underwriting',
              'Capital Gains', 'Tariffs', 'Divestment', 'Margin Loan',
              'Leveraged Buyout', 'Foreclosure', 'Property Dues', 'Corner the Market'
          }
          if set(names) != required:
              raise SystemExit(f'Canonical card roster mismatch: {names}')
          print('Validated 12-card guide source and generated DOCX/PDF')
          PY
          pdfinfo releases/v0.6/faction-guides/financier/Gauntlet_v0.6_Financier_Faction_Guide.pdf | grep '^Pages:'

      - name: Remove one-time build automation
        run: |
          rm .github/workflows/finalize-financier-package.yml
          rm scripts/finalize_financier_package.py
          rm scripts/build_financier_faction_guide.py

      - name: Commit finalized package
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize definitive Financier faction guide package'
          git push origin HEAD:agent/finalize-financier-faction-guide
