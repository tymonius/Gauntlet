<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="552" viewBox="0 0 1000 552">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0" stop-color="#66514d"/>
      <stop offset="1" stop-color="#251715"/>
    </radialGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#160f0e" stop-opacity=".9"/>
      <stop offset=".14" stop-color="#160f0e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#251513" stop-opacity="0"/>
      <stop offset="1" stop-color="#100e0d" stop-opacity=".82"/>
    </linearGradient>
    <clipPath id="portrait"><rect x="250" y="0" width="500" height="552" rx="4"/></clipPath>
  </defs>
  <rect width="1000" height="552" fill="url(#bg)"/>
  <g clip-path="url(#portrait)">
    <image href="../executive.png" x="-475" y="-17" width="1807" height="2418"/>
  </g>
  <rect width="1000" height="552" fill="url(#top)"/>
  <rect width="1000" height="552" fill="url(#shade)"/>
</svg>
